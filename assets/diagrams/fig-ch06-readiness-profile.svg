oke-width="1" stroke-dasharray="4 3"></rect><text x="467.3333333333333" y="552" text-anchor="middle" font-size="9.5" font-weight="700" fill="#AEB8C2">R3</text><path d="M412.66666666666663 531 l4 0 0 34 -4 0" fill="none" stroke="#1A1A1A" stroke-width="1.5"></path><text x="406.66666666666663" y="528" text-anchor="end" font-size="8.5" font-weight="700" fill="#1A1A1A">ceiling R2</text><rect x="40" y="592" width="496" height="34" rx="4" fill="#5C6B7A"></rect><rect x="40" y="592" width="5" height="34" rx="2.5" fill="#E8A33D"></rect><text x="292" y="613.5" text-anchor="middle" font-size="10.6" font-weight="600" fill="#fff" letter-spacing="0.2">Readiness is set by the weakest binding dimension — here Data estate and People &amp; skills.</text><text x="40" y="650" font-size="9" font-style="italic" fill="#5C6B7A">Example &#34;patchy&#34; profile (Appendix A). People &amp; skills carries double routing weight (×2). Rung tones match Ch. 3.</text>
