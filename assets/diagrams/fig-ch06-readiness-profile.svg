<text x="40" y="52" font-size="23" font-weight="700" fill="#1B3A5C" letter-spacing="0.3">The Readiness Profile</text><rect x="40" y="62" width="46" height="4" rx="2" fill="#E8A33D"></rect><text x="536" y="34" text-anchor="end" font-size="9.5" font-weight="600" fill="#5C6B7A" letter-spacing="1.5">CHAPTER 6</text><text x="40" y="84" font-size="11" fill="#5C6B7A">Six dimensions, scored against three rungs</text><text x="40" y="106" font-size="10" fill="#1A1A1A" font-weight="400"><tspan x="40" dy="0">Each dimension carries a ceiling — R1 foundational, R2 developing, R3 ready. The lowest binding</tspan><tspan x="40" dy="12.5">dimensions cap the whole.</tspan></text><text x="40" y="150" font-size="8.5" font-weight="700" fill="#5C6B7A" letter-spacing="0.8">RUNGS</text><rect x="104" y="139" width="16" height="14" rx="2" fill="#E9EDF1" stroke="#C7D1DA" stroke-width="0.8"></rect><text x="126" y="150" font-size="9" fill="#1A1A1A"><tspan font-weight="700">R1</tspan> Foundational</text><rect x="234" y="139" width="16" height="14" rx="2" fill="#A7BBCB" stroke="#C7D1DA" stroke-width="0.8"></rect><text x="256" y="150" font-size="9" fill="#1A1A1A"><tspan font-weight="700">R2</tspan> Developing</text><rect x="364" y="139" width="16" height="14" rx="2" fill="#1B3A5C"></rect><text x="386" y="150" font-size="9" fill="#1A1A1A"><tspan font-weight="700">R3</tspan> Ready</text><text x="46" y="207" font-size="11.5" font-weight="700" fill="#1A1A1A">Leadership</text><rect x="196" y="196" width="105.33333333333333" height="24" rx="3" fill="#E9EDF1" stroke="#C7D1DA" stroke-width="0.7"></rect><text x="248.66666666666666" y="212" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1A1A1A">R1</text><rect x="305.3333333333333" y="196" width="105.33333333333333" height="24" rx="3" fill="#A7BBCB" stroke="#C7D1DA" stroke-width="0.7"></rect><text x="358" y="212" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1A1A1A">R2</text><rect x="414.66666666666663" y="196" width="105.33333333333333" height="24" rx="3" fill="#1B3A5C"></rect><text x="467.3333333333333" y="212" text-anchor="middle" font-size="9.5" font-weight="700" fill="#fff">R3</text><path d="M522 191 l4 0 0 34 -4 0" fill="none" stroke="#1A1A1A" stroke-width="1.5"></path><text x="516" y="188" text-anchor="end" font-size="8.5" font-weight="700" fill="#1A1A1A">ceiling R3</text><text x="46" y="275" font-size="11.5" font-weight="700" fill="#1A1A1A">Legal &amp; sovereignty</text><rect x="196" y="264" width="105.33333333333333" height="24" rx="3" fill="#E9EDF1" stroke="#C7D1DA" stroke-width="0.7"></rect><text x="248.66666666666666" y="280" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1A1A1A">R1</text><rect x="305.3333333333333" y="264" width="105.33333333333333" height="24" rx="3" fill="#A7BBCB" stroke="#C7D1DA" stroke-width="0.7"></rect><text x="358" y="280" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1A1A1A">R2</text><rect x="414.66666666666663" y="264" width="105.33333333333333" height="24" rx="3" fill="#F4F6F8" stroke="#DCE2E8" stroke-width="1" stroke-dasharray="4 3"></rect><text x="467.3333333333333" y="280" text-anchor="middle" font-size="9.5" font-weight="700" fill="#AEB8C2">R3</text><path d="M412.66666666666663 259 l4 0 0 34 -4 0" fill="none" stroke="#1A1A1A" stroke-width="1.5"></path><text x="406.66666666666663" y="256" text-anchor="end" font-size="8.5" font-weight="700" fill="#1A1A1A">ceiling R2</text><rect x="36" y="318" width="4" height="56" rx="2" fill="#E8A33D"></rect><text x="46" y="343" font-size="11.5" font-weight="700" fill="#1A1A1A">Data estate</text><text x="46" y="357" font-size="8" font-weight="700" fill="#E8A33D" letter-spacing="0.5">BINDING CONSTRAINT</text><rect x="196" y="332" width="105.33333333333333" height="24" rx="3" fill="#E9EDF1" stroke="#C7D1DA" stroke-width="0.7"></rect><text x="248.66666666666666" y="348" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1A1A1A">R1</text><rect x="305.3333333333333" y="332" width="105.33333333333333" height="24" rx="3" fill="#F4F6F8" stroke="#DCE2E8" stroke-width="1" stroke-dasharray="4 3"></rect><text x="358" y="348" text-anchor="middle" font-size="9.5" font-weight="700" fill="#AEB8C2">R2</text><rect x="414.66666666666663" y="332" width="105.33333333333333" height="24" rx="3" fill="#F4F6F8" stroke="#DCE2E8" stroke-width="1" stroke-dasharray="4 3"></rect><text x="467.3333333333333" y="348" text-anchor="middle" font-size="9.5" font-weight="700" fill="#AEB8C2">R3</text><path d="M303.3333333333333 327 l4 0 0 34 -4 0" fill="none" stroke="#1A1A1A" stroke-width="1.5"></path><text x="297.3333333333333" y="324" text-anchor="end" font-size="8.5" font-weight="700" fill="#1A1A1A">ceiling R1</text><text x="46" y="411" font-size="11.5" font-weight="700" fill="#1A1A1A">Technology &amp; ops</text><rect x="196" y="400" width="105.33333333333333" height="24" rx="3" fill="#E9EDF1" stroke="#C7D1DA" stroke-width="0.7"></rect><text x="248.66666666666666" y="416" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1A1A1A">R1</text><rect x="305.3333333333333" y="400" width="105.33333333333333" height="24" rx="3" fill="#A7BBCB" stroke="#C7D1DA" stroke-width="0.7"></rect><text x="358" y="416" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1A1A1A">R2</text><rect x="414.66666666666663" y="400" width="105.33333333333333" height="24" rx="3" fill="#F4F6F8" stroke="#DCE2E8" stroke-width="1" stroke-dasharray="4 3"></rect><text x="467.3333333333333" y="416" text-anchor="middle" font-size="9.5" font-weight="700" fill="#AEB8C2">R3</text><path d="M412.66666666666663 395 l4 0 0 34 -4 0" fill="none" stroke="#1A1A1A" stroke-width="1.5"></path><text x="406.66666666666663" y="392" text-anchor="end" font-size="8.5" font-weight="700" fill="#1A1A1A">ceiling R2</text><rect x="36" y="454" width="4" height="56" rx="2" fill="#E8A33D"></rect><text x="46" y="479" font-size="11.5" font-weight="700" fill="#1A1A1A">People &amp; skills</text><rect x="150" y="469" wid