<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 720" width="576" height="720">
<defs><filter id="gs"><feColorMatrix type="saturate" values="0"></feColorMatrix></filter></defs>
<rect width="576" height="864" fill="#fff"></rect>
<g filter="url(#gs)"><text x="40" y="52" font-size="23" font-weight="700" fill="#1B3A5C" letter-spacing="0.3">Agent to Agent, Across the Border</text><rect x="40" y="62" width="46" height="4" rx="2" fill="#E8A33D"></rect><text x="536" y="34" text-anchor="end" font-size="9.5" font-weight="600" fill="#5C6B7A" letter-spacing="1.5">CHAPTER 16</text><text x="40" y="84" font-size="11" fill="#5C6B7A">How trade-side and customs-side agents will transact</text><text x="40" y="106" font-size="10" fill="#1A1A1A" font-weight="400"><tspan x="40" dy="0">Agents on each side negotiate the exchange — but every agent is authenticated at the border,</tspan><tspan x="40" dy="12.5">and accountability stays on its own side.</tspan></text><text x="40" y="150" font-size="10" font-weight="700" fill="#5C6B7A" letter-spacing="1.5">TRADE SIDE</text><text x="536" y="150" text-anchor="end" font-size="10" font-weight="700" fill="#5C6B7A" letter-spacing="1.5">CUSTOMS SIDE</text><text x="288" y="150" text-anchor="middle" font-size="8" font-weight="700" fill="#5C6B7A" letter-spacing="1">BORDER</text><line x1="288" y1="158" x2="288" y2="566" stroke="#5C6B7A" stroke-width="1.2" stroke-dasharray="5 4"></line><rect x="40" y="188" width="196" height="92" rx="8" fill="#fff" stroke="#C7D1DA"></rect><g transform="translate(56,204) scale(0.9166666666666666)"><rect x="2.8" y="3.3" width="18.4" height="17.4" rx="4" fill="#fff" stroke="#1B3A5C" stroke-width="1.8"></rect><path d="M8.4 9.6 15.6 9.6 12 15.7Z" fill="none" stroke="#1B3A5C" stroke-width="1.1"></path><circle cx="8.4" cy="9.6" r="1.8" fill="#1B3A5C"></circle><circle cx="15.6" cy="9.6" r="1.8" fill="#1B3A5C"></circle><circle cx="12" cy="15.7" r="1.8" fill="#1B3A5C"></circle></g><text x="86" y="214" font-size="11.5" font-weight="700" fill="#1B3A5C">Exporter agent</text><text x="56" y="244" font-size="9.5" fill="#1A1A1A" font-weight="400"><tspan x="56" dy="0">prepares &amp; submits export data</tspan></text><rect x="40" y="300" width="196" height="92" rx="8" fill="#fff" stroke="#C7D1DA"></rect><g transform="translate(56,316) scale(0.9166666666666666)"><rect x="2.8" y="3.3" width="18.4" height="17.4" rx="4" fill="#fff" stroke="#1B3A5C" stroke-width="1.8"></rect><path d="M8.4 9.6 15.6 9.6 12 15.7Z" fill="none" stroke="#1B3A5C" stroke-width="1.1"></path><circle cx="8.4" cy="9.6" r="1.8" fill="#1B3A5C"></circle><circle cx="15.6" cy="9.6" r="1.8" fill="#1B3A5C"></circle><circle cx="12" cy="15.7" r="1.8" fill="#1B3A5C"></circle></g><text x="86" y="326" font-size="11.5" font-weight="700" fill="#1B3A5C">Forwarder agent</text><text x="56" y="356" font-size="9.5" fill="#1A1A1A" font-weight="400"><tspan x="56" dy="0">arranges movement &amp; documents</tspan></text><rect x="40" y="412" width="196" height="92" rx="8" fill="#fff" stroke="#C7D1DA"></rect><g transform="translate(56,428) scale(0.9166666666666666)"><rect x="2.8" y="3.3" width="18.4" height="17.4" rx="4" fill="#fff" stroke="#1B3A5C" stroke-width="1.8"></rect><path d="M8.4 9.6 15.6 9.6 12 15.7Z" fill="none" stroke="#1B3A5C" stroke-width="1.1"></path><circle cx="8.4" cy="9.6" r="1.8" fill="#1B3A5C"></circle><circle cx="15.6" cy="9.6" r="1.8" fill="#1B3A5C"></circle><circle cx="12" cy="15.7" r="1.8" fill="#1B3A5C"></circle></g><text x="86" y="438" font-size="11.5" font-weight="700" fill="#1B3A5C">Broker agent</text><text x="56" y="468" font-size="9.5" fill="#1A1A1A" font-weight="400"><tspan x="56" dy="0">lodges the customs declaration</tspan></text><rect x="340" y="228" width="196" height="120" rx="8" fill="#fff" stroke="#C7D1DA"></rect><g transform="translate(356,244) scale(0.9166666666666666)"><rect x="2.8" y="3.3" width="18.4" height="17.4" rx="4" fill="#fff" stroke="#1B3A5C" stroke-width="1.8"></rect><path d="M8.4 9.6 15.6 9.6 12 15.7Z" fill="none" stroke="#1B3A5C" stroke-width="1.1"></path><circle cx="8.4" cy="9.6" r="1.8" fill="#1B3A5C"></circle><circle cx="15.6" cy="9.6" r="1.8" fill="#1B3A5C"></circle><circle cx="12" cy="15.7" r="1.8" fill="#1B3A5C"></circle></g><rect x="355" y="269" width="24" height="3" rx="1.5" fill="#E8A33D"></rect><text x="386" y="254" font-size="11.5" font-weight="700" fill="#1B3A5C">Clearing agent</text><text x="386" y="267" font-size="8" font-weight="700" fill="#E8A33D" letter-spacing="0.4">WITHIN MANDATE</text><text x="356" y="294" font-size="9.5" fill="#1A1A1A" font-weight="400"><tspan x="356" dy="0">Clears low-risk cases within</tspan><tspan x="356" dy="11.5">mandate; escalates the rest.</tspan></text><rect x="340" y="384" width="196" height="120" rx="8" fill="#fff" stroke="#C7D1DA"></rect><g transform="translate(356,400) scale(0.9166666666666666)"><circle cx="12" cy="7.4" r="4.2" fill="#5C6B7A"></circle><path d="M3.3 21C3.3 14.8 7.6 12.3 12 12.3S20.7 14.8 20.7 21Z" fill="#5C6B7A"></path></g><text x="386" y="416" font-size="11.5" font-weight="700" fill="#1B3A5C">Supervisor</text><text x="356" y="442" font-size="9.5" fill="#1A1A1A" font-weight="400"><tspan x="356" dy="0">Owns the mandate and the</tspan><tspan x="356" dy="11.5">exception queue.</tspan></text><rect x="356" y="470" width="120" height="5" rx="2.5" fill="#5C6B7A"></rect><rect x="356" y="478" width="120" height="5" rx="2.5" fill="#C7D1DA"></rect><rect x="356" y="486" width="120" height="5" rx="2.5" fill="#C7D1DA"></rect><text x="484" y="482" font-size="7.5" fill="#5C6B7A">queue</text><rect x="250" y="198" width="76" height="300" rx="14" fill="#FFFCF6" stroke="#E8A33D" stroke-width="2"></rect><text transform="translate(281,486) rotate(-90)" font-size="10" font-weight="700" fill="#B77A16" letter-spacing="1">IDENTITY &amp; AUTH</text><text transform="translate(299,486) rotate(-90)" font-size="8" fill="#5C6B7A">whose agent · whose mandate</text><path d="M236 234 H250" fill="none" stroke="#5C6B7A" stroke-width="1.6"></path><path d="M246 230 254 234 246 238Z" fill="#5C6B7A"></path><path d="M236 346 H250" fill="none" stroke="#5C6B7A" stroke-width="1.6"></path><path d="M246 342 254 346 246 350Z" fill="#5C6B7A"></path><path d="M236 458 H250" fill="none" stroke="#5C6B7A" stroke-width="1.6"></path><path d="M246 454 254 458 246 462Z" fill="#5C6B7A"></path><path d="M326 300 H340" fill="none" stroke="#5C6B7A" stroke-width="1.8"></path><path d="M336 296 344 300 336 304Z" fill="#5C6B7A"></path><path d="M438 348 V384" fill="none" stroke="#5C6B7A" stroke-width="1.6"></path><path d="M434 380 438 388 442 380Z" fill="#5C6B7A"></path><text x="446" y="370" font-size="8" fill="#5C6B7A">exceptions</text><rect x="40" y="596" width="196" height="40" rx="4" fill="#5C6B7A"></rect><rect x="40" y="596" width="5" height="40" rx="2.5" fill="#E8A33D"></rect><text x="56" y="612" font-size="9.5" fill="#fff" font-weight="600"><tspan x="56" dy="0">Trader stays accountable for the</tspan><tspan x="56" dy="11">declaration.</tspan></text><rect x="340" y="596" width="196" height="40" rx="4" fill="#5C6B7A"></rect><rect x="340" y="596" width="5" height="40" rx="2.5" fill="#E8A33D"></rect><text x="356" y="612" font-size="9.5" fill="#fff" font-weight="600"><tspan x="356" dy="0">Administration stays accountable</tspan><tspan x="356" dy="11">for the decision.</tspan></text><text x="288" y="620" text-anchor="middle" font-size="14" font-weight="700" fill="#5C6B7A">×</text><text x="40" y="672" font-size="9" font-style="italic" fill="#5C6B7A">Amber marks the authentication layer and the clearing agent&#39;s mandate. Accountability never crosses the border.</text></g>
</svg>