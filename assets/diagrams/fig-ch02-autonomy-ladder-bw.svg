</circle><circle cx="15.6" cy="9.6" r="1.8" fill="#1B3A5C"></circle><circle cx="12" cy="15.7" r="1.8" fill="#1B3A5C"></circle></g><rect x="443" y="391" width="22" height="3" rx="1.5" fill="#E8A33D"></rect><text x="470" y="381" font-size="10.5" font-weight="600" fill="#1A1A1A">Agent</text><text x="470" y="392" font-size="8.2" fill="#5C6B7A">(within mandate)</text><line x1="40" y1="408" x2="536" y2="408" stroke="#DCE2E8" stroke-width="0.8"></line><text x="40" y="433" font-size="9" font-weight="700" fill="#5C6B7A" letter-spacing="0.4">ACTS</text><g transform="translate(112,417) scale(0.75)"><circle cx="12" cy="7.4" r="4.2" fill="#5C6B7A"></circle><path d="M3.3 21C3.3 14.8 7.6 12.3 12 12.3S20.7 14.8 20.7 21Z" fill="#5C6B7A"></path></g><text x="136" y="431" font-size="10.5" font-weight="500" fill="#1A1A1A">Human</text><g transform="translate(222,417) scale(0.75)"><circle cx="12" cy="7.4" r="4.2" fill="#5C6B7A"></circle><path d="M3.3 21C3.3 14.8 7.6 12.3 12 12.3S20.7 14.8 20.7 21Z" fill="#5C6B7A"></path></g><g transform="translate(242,417) scale(0.75)"><rect x="2.8" y="3.3" width="18.4" height="17.4" rx="4" fill="#fff" stroke="#1B3A5C" stroke-width="1.8"></rect><path d="M8.4 9.6 15.6 9.6 12 15.7Z" fill="none" stroke="#1B3A5C" stroke-width="1.1"></path><circle cx="8.4" cy="9.6" r="1.8" fill="#1B3A5C"></circle><circle cx="15.6" cy="9.6" r="1.8" fill="#1B3A5C"></circle><circle cx="12" cy="15.7" r="1.8" fill="#1B3A5C"></circle></g><text x="264" y="430" font-size="9.5" fill="#1A1A1A">Human</text><text x="264" y="441" font-size="9.5" fill="#1A1A1A">+ AI</text><g transform="translate(332,417) scale(0.75)"><rect x="2.8" y="3.3" width="18.4" height="17.4" rx="4" fill="#fff" stroke="#1B3A5C" stroke-width="1.8"></rect><path d="M8.4 9.6 15.6 9.6 12 15.7Z" fill="none" stroke="#1B3A5C" stroke-width="1.1"></path><circle cx="8.4" cy="9.6" r="1.8" fill="#1B3A5C"></circle><circle cx="15.6" cy="9.6" r="1.8" fill="#1B3A5C"></circle><circle cx="12" cy="15.7" r="1.8" fill="#1B3A5C"></circle></g><text x="356" y="431" font-size="10.5" font-weight="500" fill="#1A1A1A">Agent</text><g transform="translate(442,417) scale(0.75)"><rect x="2.8" y="3.3" width="18.4" height="17.4" rx="4" fill="#fff" stroke="#1B3A5C" stroke-width="1.8"></rect><path d="M8.4 9.6 15.6 9.6 12 15.7Z" fill="none" stroke="#1B3A5C" stroke-width="1.1"></path><circle cx="8.4" cy="9.6" r="1.8" fill="#1B3A5C"></circle><circle cx="15.6" cy="9.6" r="1.8" fill="#1B3A5C"></circle><circle cx="12" cy="15.7" r="1.8" fill="#1B3A5C"></circle></g><text x="466" y="431" font-size="10.5" font-weight="500" fill="#1A1A1A">Agent</text><rect x="40" y="452" width="496" height="70" fill="#F4F7F9"></rect><line x1="40" y1="452" x2="536" y2="452" stroke="#DCE2E8" stroke-width="0.8"></line><text x="40" y="468" font-size="9" font-weight="700" fill="#5C6B7A" letter-spacing="0.4">HUMAN</text><text x="40" y="478" font-size="9" font-weight="700" fill="#5C6B7A" letter-spacing="0.4">ROLE</text><text x="112" y="467" font-size="10" fill="#1A1A1A" font-weight="400"><tspan x="112" dy="0">Operator — does</tspan><tspan x="112" dy="12">the work; AI</tspan><tspan x="112" dy="12">drafts and</tspan><tspan x="112" dy="12">suggests</tspan></text><text x="222" y="467" font-size="10" fill="#1A1A1A" font-weight="400"><tspan x="222" dy="0">Pilot — AI</tspan><tspan x="222" dy="12">assists live;</tspan><tspan x="222" dy="12">officer stays in</tspan><tspan x="222" dy="12">control</tspan></text><text x="332" y="467" font-size="10" fill="#1A1A1A" font-weight="400"><tspan x="332" dy="0">Supervisor —</tspan><tspan x="332" dy="12">sets goals,</tspan><tspan x="332" dy="12">handles</tspan><tspan x="332" dy="12">exceptions</tspan></text><text x="442" y="467" font-size="10" fill="#1A1A1A" font-weight="400"><tspan x="442" dy="0">Governor — sets</tspan><tspan x="442" dy="12">mandate, audits</tspan><tspan x="442" dy="12">outcomes</tspan></text><line x1="40" y1="522" x2="536" y2="522" stroke="#DCE2E8" stroke-width="0.8"></line><text x="40" y="538" font-size="9" font-weight="700" fill="#5C6B7A" letter-spacing="0.4">CUSTOMS</text><text x="40" y="548" font-size="9" font-weight="700" fill="#5C6B7A" letter-spacing="0.4">EXAMPLE</text><text x="112" y="537" font-size="10" fill="#1A1A1A" font-weight="400"><tspan x="112" dy="0">Drafts a reply</tspan><tspan x="112" dy="12">to a trader</tspan><tspan x="112" dy="12">enquiry for the</tspan><tspan x="112" dy="12">officer to</tspan><tspan x="112" dy="12">review and send</tspan></text><text x="222" y="537" font-size="10" fill="#1A1A1A" font-weight="400"><tspan x="222" dy="0">Proposes an HS</tspan><tspan x="222" dy="12">code; officer</tspan><tspan x="222" dy="12">confirms each</tspan><tspan x="222" dy="12">one before it is</tspan><tspan x="222" dy="12">applied</tspan></text><text x="332" y="537" font-size="10" fill="#1A1A1A" font-weight="400"><tspan x="332" dy="0">Investigates</tspan><tspan x="332" dy="12">flagged</tspan><tspan x="332" dy="12">declarations:</tspan><tspan x="332" dy="12">pulls data</tspan><tspan x="332" dy="12">across systems,</tspan><tspan x="332" dy="12">compiles a case</tspan><tspan x="332" dy="12">file; officer</tspan><tspan x="332" dy="12">takes the</tspan><tspan x="332" dy="12">decision</tspan></text><text x="442" y="537" font-size="10" fill="#1A1A1A" font-weight="400"><tspan x="442" dy="0">Clears low-risk</tspan><tspan x="442" dy="12">declarations</tspan><tspan x="442" dy="12">end-to-end;</tspan><tspan x="442" dy="12">escalates</tspan><tspan x="442" dy="12">anomalies to</tspan><tspan x="442" dy="12">staff</tspan></text><rect x="40" y="654" width="496" height="74" fill="#F4F7F9"></rect><line x1="40" y1="654" x2="536" y2="654" stroke="#DCE2E8" stroke-width="0.8"></line><text x="40" y="675" font-size="9" font-weight="700" fill="#5C6B7A" letter-spacing="0.4">OVERSIGHT</text><text x="112" y="669" font-size="10" fill="#1A1A1A" font-weight="400"><tspan x="112" dy="0">Every output</tspan><tspan x="112" dy="12">checked before</tspan><tspan x="112" dy="12">use</tspan></text><text x="222" y="669" font-size="10" fill="#1A1A1A" font-weight="400"><tspan x="222" dy="0">Human confirms</tspan><tspan x="222" dy="12">each action</tspan></text><text x="332" y="669" font-size="10" fill="#1A1A1A" font-weight="400"><tspan x="332" dy="0">Review by</tspan><tspan x="332" dy="12">exception /</tspan><tspan x="332" dy="12">sampling</tspan></text><text x="442" y="669" font-size="10" fill="#1A1A1A" font-weight="400"><tspan x="442" dy="0">Post-hoc audit +</tspan><tspan x="442" dy="12">anomaly alerts</tspan></text><line x1="40" y1="728" x2="536" y2="728" stroke="#5C6B7A" stroke-width="1"></line><rect x="40" y="740" width="496" height="34" rx="4" fill="#5C6B7A"></rect><rect x="40" y="740" width="5" height="34" rx="2.5" fill="#E8A33D"></rect><text x="292" y="761.5" text-anchor="middle" font-size="10.8" font-weight="600" fill="#FFFFFF" letter-spacing="0.2">Accountability remains with the administration at every level.</text><g transform="translate(40,784) scale(0.75)"><circle cx="12" cy="7.4" r="4.2" fill="#5C6B7A"></circle><path d="M3.3 21C3.3 14.8 7.6 12.3 12 12.3S20.7 14.8 20.7 21Z" fill="#5C6B7A"></path></g><text x="64" y="798" font-size="10" fill="#1A1A1A">Human — customs officer</text><g transform="translate(210,784) scale(0.75)"><rect x="2.8" y="3.3" width="18.4" height="17.4" rx="4" fill="#fff" stroke="#1B3A5C" stroke-width="1.8"></rect><path d="M8.4 9.6 15.6 9.6 12 15.7Z" fill="none" stroke="#1B3A5C" stroke-width="1.1"></path><circle cx="8.4" cy="9.6" r="1.8" fill="#1B3A5C"></circle><circle cx="15.6" cy="9.6" r="1.8" fill="#1B3A5C"></circle><circle cx="12" cy="15.7" r="1.8" fill="#1B3A5C"></circle></g><text x="234" y="798" font-size="10" fill="#1A1A1A">AI agent</text><rect x="319" y="796" width="22" height="3" rx="1.5" fill="#E8A33D"></rect><text x="348" y="798" font-size="10" fill="#1A1A1A">Amber underline = decision authority</text><text x="40" y="818" font-size="9" font-style="italic" fill="#5C6B7A">Level colour deepens with autonomy; every distinction also holds in greyscale (shape + lightness).</text><line x1="40" y1="832" x2="536" y2="832" stroke="#DCE2E8" stroke-width="1"></line><text x="40" y="848" font-size="8.5" font-weight="600" fill="#5C6B7A">Figure 2.1 — The Autonomy Ladder</text><text x="536" y="848" text-anchor="end" font-size="8.5" fill="#5C6B7A">AI Agents at the Border · Chapter 2</text></g>
