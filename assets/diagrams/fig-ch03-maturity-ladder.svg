<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 816" width="576" height="816">
<defs></defs>
<rect width="576" height="864" fill="#fff"></rect>
<text x="40" y="52" font-size="23" font-weight="700" fill="#1B3A5C" letter-spacing="0.3">The Maturity Ladder</text><rect x="40" y="62" width="46" height="4" rx="2" fill="#E8A33D"></rect><text x="536" y="34" text-anchor="end" font-size="9.5" font-weight="600" fill="#5C6B7A" letter-spacing="1.5">CHAPTER 3</text><text x="40" y="84" font-size="11" fill="#5C6B7A">Three stages of AI capability in customs</text><text x="40" y="106" font-size="10" fill="#1A1A1A" font-weight="400"><tspan x="40" dy="0">Value and capability rise stage by stage — but each rung depends on the prerequisites of the</tspan><tspan x="40" dy="12.5">one below it.</tspan></text><rect x="40" y="188" width="156" height="118" rx="5" fill="#E9EDF1"></rect><line x1="50" y1="225.5" x2="186" y2="225.5" stroke="#1A1A1A" stroke-width="1" opacity="0.08"></line><line x1="50" y1="245" x2="186" y2="245" stroke="#1A1A1A" stroke-width="1" opacity="0.08"></line><line x1="50" y1="264.5" x2="186" y2="264.5" stroke="#1A1A1A" stroke-width="1" opacity="0.08"></line><rect x="51" y="199" width="26" height="22" rx="4" fill="#fff" stroke="#C7D1DA"></rect><text x="64" y="215" text-anchor="middle" font-size="13" font-weight="700" fill="#1B3A5C">1</text><text x="83" y="215" font-size="8" font-weight="600" fill="#1A1A1A" opacity="0.75" letter-spacing="1">STAGE</text><text x="52" y="240" font-size="14" font-weight="700" fill="#1A1A1A">Document</text><text x="52" y="256" font-size="14" font-weight="700" fill="#1A1A1A">Intelligence</text><text x="52" y="280" font-size="9" fill="#1A1A1A" opacity="0.92">Reads and structures data</text><text x="52" y="291" font-size="9" fill="#1A1A1A" opacity="0.92">from customs documents.</text><rect x="210" y="158" width="156" height="148" rx="5" fill="#A7BBCB"></rect><line x1="220" y1="203" x2="356" y2="203" stroke="#1A1A1A" stroke-width="1" opacity="0.08"></line><line x1="220" y1="230" x2="356" y2="230" stroke="#1A1A1A" stroke-width="1" opacity="0.08"></line><line x1="220" y1="257" x2="356" y2="257" stroke="#1A1A1A" stroke-width="1" opacity="0.08"></line><rect x="221" y="169" width="26" height="22" rx="4" fill="#fff" stroke="#C7D1DA"></rect><text x="234" y="185" text-anchor="middle" font-size="13" font-weight="700" fill="#1B3A5C">2</text><text x="253" y="185" font-size="8" font-weight="600" fill="#1A1A1A" opacity="0.75" letter-spacing="1">STAGE</text><text x="222" y="210" font-size="14" font-weight="700" fill="#1A1A1A">GenAI Assistants</text><text x="222" y="234" font-size="9" fill="#1A1A1A" opacity="0.92">Officers query, summarise</text><text x="222" y="245" font-size="9" fill="#1A1A1A" opacity="0.92">and draft in plain language.</text><rect x="380" y="128" width="156" height="178" rx="5" fill="#1B3A5C"></rect><line x1="390" y1="180.5" x2="526" y2="180.5" stroke="#FFFFFF" stroke-width="1" opacity="0.08"></line><line x1="390" y1="215" x2="526" y2="215" stroke="#FFFFFF" stroke-width="1" opacity="0.08"></line><line x1="390" y1="249.5" x2="526" y2="249.5" stroke="#FFFFFF" stroke-width="1" opacity="0.08"></line><rect x="391" y="139" width="26" height="22" rx="4" fill="#fff" stroke="none"></rect><text x="404" y="155" text-anchor="middle" font-size="13" font-weight="700" fill="#1B3A5C">3</text><text x="423" y="155" font-size="8" font-weight="600" fill="#FFFFFF" opacity="0.75" letter-spacing="1">STAGE</text><text x="392" y="180" font-size="14" font-weight="700" fill="#FFFFFF">AI Agents</text><text x="392" y="204" font-size="9" fill="#FFFFFF" opacity="0.92">Plans and acts across tools</text><text x="392" y="215" font-size="9" fill="#FFFFFF" opacity="0.92">to finish multi-step tasks.</text><line x1="40" y1="306" x2="536" y2="306" stroke="#5C6B7A" stroke-width="1.5"></line><line x1="70" y1="324" x2="516" y2="324" stroke="#E8A33D" stroke-width="2"></line><path d="M516 320 526 324 516 328Z" fill="#E8A33D"></path><text x="70" y="318" font-size="8.5" font-weight="700" fill="#E8A33D" letter-spacing="1.5">INCREASING VALUE &amp; CAPABILITY</text><rect x="40" y="342" width="496" height="56" fill="#F4F7F9"></rect><line x1="40" y1="342" x2="536" y2="342" stroke="#DCE2E8" stroke-width="0.8"></line><text x="44" y="358" font-size="9" font-weight="700" fill="#5C6B7A" letter-spacing="0.5">WHO ACTS</text><rect x="40" y="366" width="3" height="26" fill="#E9EDF1"></rect><g transform="translate(50,368) scale(0.8333333333333334)"><circle cx="12" cy="7.4" r="4.2" fill="#5C6B7A"></circle><path d="M3.3 21C3.3 14.8 7.6 12.3 12 12.3S20.7 14.8 20.7 21Z" fill="#5C6B7A"></path></g><text x="76" y="383" font-size="10" fill="#1A1A1A">Human runs it</text><rect x="210" y="366" width="3" height="26" fill="#A7BBCB"></rect><g transform="translate(220,368) scale(0.8333333333333334)"><circle cx="12" cy="7.4" r="4.2" fill="#5C6B7A"></circle><path d="M3.3 21C3.3 14.8 7.6 12.3 12 12.3S20.7 14.8 20.7 21Z" fill="#5C6B7A"></path></g><g transform="translate(242,368) scale(0.8333333333333334)"><rect x="2.8" y="3.3" width="18.4" height="17.4" rx="4" fill="#fff" stroke="#1B3A5C" stroke-width="1.8"></rect><path d="M8.4 9.6 15.6 9.6 12 15.7Z" fill="none" stroke="#1B3A5C" stroke-width="1.1"></path><circle cx="8.4" cy="9.6" r="1.8" fill="#1B3A5C"></circle><circle cx="15.6" cy="9.6" r="1.8" fill="#1B3A5C"></circle><circle cx="12" cy="15.7" r="1.8" fill="#1B3A5C"></circle></g><text x="268" y="383" font-size="10" fill="#1A1A1A">Human + AI</text><rect x="380" y="366" width="3" height="26" fill="#1B3A5C"></rect><g transform="translate(390,368) scale(0.8333333333333334)"><rect x="2.8" y="3.3" width="18.4" height="17.4" rx="4" fill="#fff" stroke="#1B3A5C" stroke-width="1.8"></rect><path d="M8.4 9.6 15.6 9.6 12 15.7Z" fill="none" stroke="#1B3A5C" stroke-width="1.1"></path><circle cx="8.4" cy="9.6" r="1.8" fill="#1B3A5C"></circle><circle cx="15.6" cy="9.6" r="1.8" fill="#1B3A5C"></circle><circle cx="12" cy="15.7" r="1.8" fill="#1B3A5C"></circle></g><text x="416" y="383" font-size="10" fill="#1A1A1A">Agent acts</text><line x1="40" y1="398" x2="536" y2="398" stroke="#DCE2E8" stroke-width="0.8"></line><text x="44" y="414" font-size="9" font-weight="700" fill="#5C6B7A" letter-spacing="0.5">TYPICAL VALUE DELIVERED</text><rect x="40" y="422" width="3" height="114" fill="#E9EDF1"></rect><circle cx="52" cy="435" r="1.7" fill="#5C6B7A"></circle><text x="61" y="438" font-size="9.5" fill="#1A1A1A">Faster, cleaner data</text><text x="61" y="449.5" font-size="9.5" fill="#1A1A1A">capture</text><circle cx="52" cy="465" r="1.7" fill="#5C6B7A"></circle><text x="61" y="468" font-size="9.5" fill="#1A1A1A">Fewer keying errors</text><circle cx="52" cy="483.5" r="1.7" fill="#5C6B7A"></circle><text x="61" y="486.5" font-size="9.5" fill="#1A1A1A">Declarations</text><text x="61" y="498" font-size="9.5" fill="#1A1A1A">pre-populated</text><rect x="210" y="422" width="3" height="114" fill="#A7BBCB"></rect><circle cx="222" cy="435" r="1.7" fill="#5C6B7A"></circle><text x="231" y="438" font-size="9.5" fill="#1A1A1A">Faster research and</text><text x="231" y="449.5" font-size="9.5" fill="#1A1A1A">drafting</text><circle cx="222" cy="465" r="1.7" fill="#5C6B7A"></circle><text x="231" y="468" font-size="9.5" fill="#1A1A1A">Consistent officer</text><text x="231" y="479.5" font-size="9.5" fill="#1A1A1A">guidance</text><circle cx="222" cy="495" r="1.7" fill="#5C6B7A"></circle><text x="231" y="498" font-size="9.5" fill="#1A1A1A">Quicker onboarding of new</text><text x="231" y="509.5" font-size="9.5" fill="#1A1A1A">staff</text><rect x="380" y="422" width="3" height="114" fill="#1B3A5C"></rect><circle cx="392" cy="435" r="1.7" fill="#5C6B7A"></circle><text x="401" y="438" font-size="9.5" fill="#1A1A1A">Cases progressed</text><text x="401" y="449.5" font-size="9.5" fill="#1A1A1A">end-to-end</text><circle cx="392" cy="465" r="1.7" fill="#5C6B7A"></circle><text x="401" y="468" font-size="9.5" fill="#1A1A1A">Officers focus on</text><text x="401" y="479.5" font-size="9.5" fill="#1A1A1A">judgement</text><circle cx="392" cy="495" r="1.7" fill="#5C6B7A"></circle><text x="401" y="498" font-size="9.5" fill="#1A1A1A">More throughput, not more</text><text x="401" y="509.5" font-size="9.5" fill="#1A1A1A">headcount</text><rect x="40" y="542" width="496" height="144" fill="#F4F7F9"></rect><line x1="40" y1="542" x2="536" y2="542" stroke="#DCE2E8" stroke-width="0.8"></line><text x="44" y="558" font-size="9" font-weight="700" fill="#5C6B7A" letter-spacing="0.5">PREREQUISITES</text><rect x="40" y="566" width="3" height="114" fill="#E9EDF1"></rect><circle cx="52" cy="579" r="1.7" fill="#5C6B7A"></circle><text x="61" y="582" font-size="9.5" fill="#1A1A1A">Digitised documents</text><circle cx="52" cy="597.5" r="1.7" fill="#5C6B7A"></circle><text x="61" y="600.5" font-size="9.5" fill="#1A1A1A">Validated data schema</text><circle cx="52" cy="616" r="1.7" fill="#5C6B7A"></circle><text x="61" y="619" font-size="9.5" fill="#1A1A1A">Scanning / EDI pipeline</text><rect x="210" y="566" width="3" height="114" fill="#A7BBCB"></rect><circle cx="222" cy="579" r="1.7" fill="#5C6B7A"></circle><text x="231" y="582" font-size="9.5" fill="#1A1A1A">Governed knowledge base</text><circle cx="222" cy="597.5" r="1.7" fill="#5C6B7A"></circle><text x="231" y="600.5" font-size="9.5" fill="#1A1A1A">Role-based access</text><text x="231" y="612" font-size="9.5" fill="#1A1A1A">controls</text><circle cx="222" cy="627.5" r="1.7" fill="#5C6B7A"></circle><text x="231" y="630.5" font-size="9.5" fill="#1A1A1A">Usage policy and training</text><rect x="380" y="566" width="3" height="114" fill="#1B3A5C"></rect><circle cx="392" cy="579" r="1.7" fill="#5C6B7A"></circle><text x="401" y="582" font-size="9.5" fill="#1A1A1A">Reliable system APIs</text><circle cx="392" cy="597.5" r="1.7" fill="#5C6B7A"></circle><text x="401" y="600.5" font-size="9.5" fill="#1A1A1A">Audit logging of every</text><text x="401" y="612" font-size="9.5" fill="#1A1A1A">action</text><circle cx="392" cy="627.5" r="1.7" fill="#5C6B7A"></circle><text x="401" y="630.5" font-size="9.5" fill="#1A1A1A">Oversight model (Ch. 9)</text><circle cx="392" cy="646" r="1.7" fill="#5C6B7A"></circle><text x="401" y="649" font-size="9.5" fill="#1A1A1A">Clear task mandates</text><line x1="40" y1="686" x2="536" y2="686" stroke="#5C6B7A" stroke-width="1"></line><rect x="40" y="700" width="496" height="34" rx="4" fill="#5C6B7A"></rect><rect x="40" y="700" width="5" height="34" rx="2.5" fill="#E8A33D"></rect><text x="292" y="721.5" text-anchor="middle" font-size="10.6" font-weight="600" fill="#FFFFFF" letter-spacing="0.2">Each stage builds on the last — skipping prerequisites is the classic failure mode.</text><text x="40" y="764" font-size="9" font-style="italic" fill="#5C6B7A">Tones borrow from the Autonomy Ladder (Ch. 2); this ladder has three rungs, not four. Distinctions hold in greyscale.</text>
</svg>