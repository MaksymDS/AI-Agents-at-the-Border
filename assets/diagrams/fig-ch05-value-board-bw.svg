<g filter="url(#gs)"><text x="40" y="52" font-size="23" font-weight="700" fill="#1B3A5C" letter-spacing="0.3">The Verified Value Board</text><rect x="40" y="62" width="46" height="4" rx="2" fill="#E8A33D"></rect><text x="536" y="34" text-anchor="end" font-size="9.5" font-weight="600" fill="#5C6B7A" letter-spacing="1.5">CHAPTER 5</text><text x="40" y="84" font-size="11" fill="#5C6B7A">What the public record actually supports</text><text x="40" y="106" font-size="10" fill="#1A1A1A" font-weight="400"><tspan x="40" dy="0">Four value channels, each with its strongest anchor — and the evidence grade that keeps it</tspan><tspan x="40" dy="12.5">honest.</tspan></text><rect x="40" y="178" width="244" height="196" rx="7" fill="#FBFCFD" stroke="#DCE2E8" stroke-width="1"></rect><rect x="40" y="178" width="244" height="26" rx="7" fill="#517391"></rect><rect x="40" y="191" width="244" height="13" fill="#517391"></rect><text x="54" y="196" font-size="10.5" fill="#fff" font-weight="700" letter-spacing="1">EFFICIENCY</text><rect x="214.8" y="183.5" width="57.2" height="15" rx="7.5" fill="#1B3A5C"></rect><text x="243.4" y="194.5" text-anchor="middle" font-size="8" font-weight="700" fill="#fff" letter-spacing="0.5">VERIFIED</text><text x="54" y="232" font-size="20" fill="#1B3A5C" font-weight="700">~1 hr → &lt;1 min</text><text x="54" y="248" font-size="9" fill="#5C6B7A" font-weight="400"><tspan x="54" dy="0">high-risk cargo analysis</tspan></text><text x="54" y="284" font-size="20" fill="#1B3A5C" font-weight="700">~$92M / yr</text><text x="54" y="300" font-size="9" fill="#5C6B7A" font-weight="400"><tspan x="54" dy="0">saved; volume absorbed</tspan></text><text x="54" y="362" font-size="8.3" fill="#5C6B7A" font-weight="400" font-style="italic">Korea Customs Service</text><rect x="292" y="178" width="244" height="196" rx="7" fill="#FCFAF4" stroke="#E8A33D" stroke-width="1.6"></rect><rect x="292" y="178" width="244" height="26" rx="7" fill="#E8A33D"></rect><rect x="292" y="191" width="244" height="13" fill="#E8A33D"></rect><text x="306" y="196" font-size="10.5" fill="#1A1A1A" font-weight="700" letter-spacing="1">CONTROL</text><rect x="466.8" y="183.5" width="57.2" height="15" rx="7.5" fill="#1B3A5C"></rect><text x="495.40000000000003" y="194.5" text-anchor="middle" font-size="8" font-weight="700" fill="#fff" letter-spacing="0.5">VERIFIED</text><text x="306" y="238" font-size="34" fill="#1B3A5C" font-weight="700">20×</text><text x="306" y="256" font-size="9" fill="#5C6B7A" font-weight="400"><tspan x="306" dy="0">more effective than random</tspan></text><text x="306" y="302" font-size="20" fill="#1B3A5C" font-weight="700">20,000+ · &gt;95%</text><text x="306" y="318" font-size="9" fill="#5C6B7A" font-weight="400"><tspan x="306" dy="0">detections · accuracy</tspan></text><text x="306" y="362" font-size="8.3" fill="#5C6B7A" font-weight="400" font-style="italic">Brazil SISAM (2014) · China GACC</text><rect x="40" y="392" width="244" height="196" rx="7" fill="#FBFCFD" stroke="#DCE2E8" stroke-width="1"></rect><rect x="40" y="392" width="244" height="26" rx="7" fill="#517391"></rect><rect x="40" y="405" width="244" height="13" fill="#517391"></rect><text x="54" y="410" font-size="10.5" fill="#fff" font-weight="700" letter-spacing="1">REVENUE</text><rect x="214.8" y="397.5" width="57.2" height="15" rx="7.5" fill="none" stroke="#E8A33D" stroke-width="1"></rect><text x="243.4" y="408.5" text-anchor="middle" font-size="8" font-weight="700" fill="#B77A16" letter-spacing="0.5">ADJACENT</text><text x="54" y="446" font-size="20" fill="#1B3A5C" font-weight="700">€185M</text><text x="54" y="462" font-size="9" fill="#5C6B7A" font-weight="400"><tspan x="54" dy="0">incremental (tax administration)</tspan></text><text x="54" y="498" font-size="20" fill="#1B3A5C" font-weight="700">15,000 → 100</text><text x="54" y="514" font-size="9" fill="#5C6B7A" font-weight="400"><tspan x="54" dy="0">returns → confirmed fraud</tspan></text><text x="54" y="576" font-size="8.3" fill="#5C6B7A" font-weight="400" font-style="italic">Austria · Belgium — adjacent</text><rect x="292" y="392" width="244" height="196" rx="7" fill="#FBFCFD" stroke="#DCE2E8" stroke-width="1"></rect><rect x="292" y="392" width="244" height="26" rx="7" fill="#517391"></rect><rect x="292" y="405" width="244" height="13" fill="#517391"></rect><text x="306" y="410" font-size="10.5" fill="#fff" font-weight="700" letter-spacing="1">FACILITATION</text><rect x="450.6" y="397.5" width="73.4" height="15" rx="7.5" fill="none" stroke="#5C6B7A" stroke-width="1"></rect><text x="487.3" y="408.5" text-anchor="middle" font-size="8" font-weight="700" fill="#5C6B7A" letter-spacing="0.5">DIRECTIONAL</text><text x="306" y="446" font-size="20" fill="#1B3A5C" font-weight="700">clearance time</text><text x="306" y="462" font-size="9" fill="#5C6B7A" font-weight="400"><tspan x="306" dy="0">predictability, experience</tspan></text><text x="306" y="498" font-size="20" fill="#1B3A5C" font-weight="700">transshipment</text><text x="306" y="514" font-size="9" fill="#5C6B7A" font-weight="400"><tspan x="306" dy="0">competitiveness</tspan></text><text x="306" y="576" font-size="8.3" fill="#5C6B7A" font-weight="400" font-style="italic">Directional; program-specific</text><rect x="40" y="608" width="496" height="34" rx="4" fill="#5C6B7A"></rect><rect x="40" y="608" width="5" height="34" rx="2.5" fill="#E8A33D"></rect><text x="292" y="629.5" text-anchor="middle" font-size="10.4" font-weight="600" fill="#fff" letter-spacing="0.2">Every number carries its evidence grade — tax figures labelled, not laundered.</text></g>
