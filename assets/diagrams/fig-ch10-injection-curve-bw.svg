<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 672" width="576" height="672">
<defs><filter id="gs"><feColorMatrix type="saturate" values="0"></feColorMatrix></filter></defs>
<rect width="576" height="864" fill="#fff"></rect>
<g filter="url(#gs)"><text x="40" y="52" font-size="23" font-weight="700" fill="#1B3A5C" letter-spacing="0.3">The 1 / 10 / 100 Number</text><rect x="40" y="62" width="46" height="4" rx="2" fill="#E8A33D"></rect><text x="536" y="34" text-anchor="end" font-size="9.5" font-weight="600" fill="#5C6B7A" letter-spacing="1.5">CHAPTER 10</text><text x="40" y="84" font-size="11" fill="#5C6B7A">Injection resistance under a persistent adversary</text><text x="40" y="106" font-size="10" fill="#1A1A1A" font-weight="400"><tspan x="40" dy="0">A frontier lab’s own measurement, agentic setting. Read the shape, not the endpoint.</tspan></text><line x1="110" y1="520" x2="470" y2="520" stroke="#5C6B7A" stroke-width="1.2"></line><line x1="110" y1="190" x2="110" y2="520" stroke="#DCE2E8"></line><line x1="110" y1="428.57142857142856" x2="470" y2="428.57142857142856" stroke="#DCE2E8" stroke-width="0.6"></line><text x="102" y="431.57142857142856" font-size="8" fill="#5C6B7A" font-weight="400" text-anchor="end">20%</text><line x1="110" y1="337.14285714285717" x2="470" y2="337.14285714285717" stroke="#DCE2E8" stroke-width="0.6"></line><text x="102" y="340.14285714285717" font-size="8" fill="#5C6B7A" font-weight="400" text-anchor="end">40%</text><line x1="110" y1="245.71428571428572" x2="470" y2="245.71428571428572" stroke="#DCE2E8" stroke-width="0.6"></line><text x="102" y="248.71428571428572" font-size="8" fill="#5C6B7A" font-weight="400" text-anchor="end">60%</text><rect x="144.5" y="498.51428571428573" width="74" height="21.485714285714266" rx="3" fill="#A7BBCB"></rect><text x="181.5" y="490.51428571428573" font-size="15" fill="#1B3A5C" font-weight="700" text-anchor="middle">4.7%</text><text x="181.5" y="536" font-size="9" fill="#5C6B7A" font-weight="400" text-anchor="middle">1 attempt</text><rect x="253" y="366.4" width="74" height="153.60000000000002" rx="3" fill="#517391"></rect><text x="290" y="358.4" font-size="15" fill="#1B3A5C" font-weight="700" text-anchor="middle">33.6%</text><text x="290" y="536" font-size="9" fill="#5C6B7A" font-weight="400" text-anchor="middle">10 attempts</text><rect x="361.5" y="232" width="74" height="288" rx="3" fill="#1B3A5C"></rect><text x="398.5" y="224" font-size="15" fill="#1B3A5C" font-weight="700" text-anchor="middle">63.0%</text><text x="398.5" y="536" font-size="9" fill="#5C6B7A" font-weight="400" text-anchor="middle">100 attempts</text><rect x="110" y="176" width="4" height="14" fill="#E8A33D"></rect><text x="120" y="187" font-size="9" fill="#5C6B7A" font-weight="600">attack success rate</text><text x="110" y="572" font-size="10" fill="#1A1A1A" font-weight="400"><tspan x="110" dy="0">Against an adversary who tries once, a hardened model holds. Against</tspan><tspan x="110" dy="13">one who tries continuously — as trade fraud does — model-level</tspan><tspan x="110" dy="13">defence erodes toward failure.</tspan></text><rect x="40" y="600" width="496" height="34" rx="4" fill="#5C6B7A"></rect><rect x="40" y="600" width="5" height="34" rx="2.5" fill="#E8A33D"></rect><text x="292" y="621.5" text-anchor="middle" font-size="10.6" font-weight="600" fill="#fff" letter-spacing="0.2">Defense-in-depth, not model trust — the design principle in one sentence.</text></g>
</svg>