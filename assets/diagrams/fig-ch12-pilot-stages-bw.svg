<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 792" width="576" height="792">
<defs><filter id="gs"><feColorMatrix type="saturate" values="0"></feColorMatrix></filter></defs>
<rect width="576" height="864" fill="#fff"></rect>
<g filter="url(#gs)"><text x="40" y="52" font-size="23" font-weight="700" fill="#1B3A5C" letter-spacing="0.3">Piloting in Stages</text><rect x="40" y="62" width="46" height="4" rx="2" fill="#E8A33D"></rect><text x="536" y="34" text-anchor="end" font-size="9.5" font-weight="600" fill="#5C6B7A" letter-spacing="1.5">CHAPTER 12</text><text x="40" y="84" font-size="11" fill="#5C6B7A">Taking an agent from trial to production safely</text><text x="40" y="106" font-size="10" fill="#1A1A1A" font-weight="400"><tspan x="40" dy="0">Each stage runs on live data; a human-owned gate, with criteria set in advance, controls the</tspan><tspan x="40" dy="12.5">move to the next.</tspan></text><rect x="40" y="208" width="156" height="92" rx="5" fill="#A7BBCB" stroke="#5C6B7A" stroke-width="1.3" stroke-dasharray="5 3"></rect><rect x="51" y="219" width="66" height="20" rx="5" fill="#fff" fill-opacity="1" stroke="#C7D1DA"></rect><text x="84" y="233" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1B3A5C" letter-spacing="0.5">STAGE 1</text><text x="184" y="233" text-anchor="end" font-size="7.5" font-style="italic" fill="#5C6B7A">no live effect</text><text x="52" y="258" font-size="13.5" font-weight="700" fill="#1A1A1A">Shadow mode</text><text x="52" y="279" font-size="9" fill="#1A1A1A" opacity="0.92">Runs in parallel; no live</text><text x="52" y="290" font-size="9" fill="#1A1A1A" opacity="0.92">action.</text><rect x="210" y="178" width="156" height="122" rx="5" fill="#517391"></rect><rect x="221" y="189" width="66" height="20" rx="5" fill="#fff" fill-opacity="0.16"></rect><text x="254" y="203" text-anchor="middle" font-size="9.5" font-weight="700" fill="#fff" letter-spacing="0.5">STAGE 2</text><text x="222" y="228" font-size="13.5" font-weight="700" fill="#fff">Supervised</text><text x="222" y="243" font-size="13.5" font-weight="700" fill="#fff">operation</text><text x="222" y="264" font-size="9" fill="#fff" opacity="0.92">Acts live; every action</text><text x="222" y="275" font-size="9" fill="#fff" opacity="0.92">approved.</text><rect x="380" y="148" width="156" height="152" rx="5" fill="#1B3A5C"></rect><rect x="391" y="159" width="66" height="20" rx="5" fill="#fff" fill-opacity="0.16"></rect><text x="424" y="173" text-anchor="middle" font-size="9.5" font-weight="700" fill="#fff" letter-spacing="0.5">STAGE 3</text><text x="392" y="198" font-size="13.5" font-weight="700" fill="#fff">Gated expansion by</text><text x="392" y="213" font-size="13.5" font-weight="700" fill="#fff">slice</text><text x="392" y="234" font-size="9" fill="#fff" opacity="0.92">Scope widens slice by slice.</text><circle cx="203" cy="250" r="11" fill="#fff" stroke="#E8A33D" stroke-width="1.5"></circle><path d="M200 245 207 250 200 255" fill="none" stroke="#E8A33D" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path><text x="203" y="234" text-anchor="middle" font-size="6.5" font-weight="700" fill="#E8A33D" letter-spacing="1">GATE</text><circle cx="373" cy="250" r="11" fill="#fff" stroke="#E8A33D" stroke-width="1.5"></circle><path d="M370 245 377 250 370 255" fill="none" stroke="#E8A33D" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path><text x="373" y="234" text-anchor="middle" font-size="6.5" font-weight="700" fill="#E8A33D" letter-spacing="1">GATE</text><line x1="40" y1="300" x2="536" y2="300" stroke="#5C6B7A" stroke-width="1.5"></line><line x1="70" y1="324" x2="516" y2="324" stroke="#E8A33D" stroke-width="2"></line><path d="M516 320 526 324 516 328Z" fill="#E8A33D"></path><text x="70" y="318" font-size="8.5" font-weight="700" fill="#E8A33D" letter-spacing="1.5">TOWARD FULL DEPLOYMENT</text><rect x="40" y="352" width="496" height="66" fill="#F4F7F9"></rect><line x1="40" y1="352" x2="536" y2="352" stroke="#DCE2E8" stroke-width="0.8"></line><text x="44" y="368" font-size="9" font-weight="700" fill="#5C6B7A" letter-spacing="0.5">AGENT DOES</text><g transform="translate(112,357) scale(0.625)"><rect x="2.8" y="3.3" width="18.4" height="17.4" rx="4" fill="#fff" stroke="#1B3A5C" stroke-width="1.8"></rect><path d="M8.4 9.6 15.6 9.6 12 15.7Z" fill="none" stroke="#1B3A5C" stroke-width="1.1"></path><circle cx="8.4" cy="9.6" r="1.8" fill="#1B3A5C"></circle><circle cx="15.6" cy="9.6" r="1.8" fill="#1B3A5C"></circle><circle cx="12" cy="15.7" r="1.8" fill="#1B3A5C"></circle></g><rect x="40" y="376" width="3" height="36" fill="#A7BBCB"></rect><text x="50" y="390" font-size="9.5" fill="#1A1A1A" font-weight="400"><tspan x="50" dy="0">Runs on live data in</tspan><tspan x="50" dy="11.5">parallel; produces outputs</tspan><tspan x="50" dy="11.5">but takes no action.</tspan></text><rect x="210" y="376" width="3" height="36" fill="#517391"></rect><text x="220" y="390" font-size="9.5" fill="#1A1A1A" font-weight="400"><tspan x="220" dy="0">Acts on live cases in a</tspan><tspan x="220" dy="11.5">narrow scope; each action</tspan><tspan x="220" dy="11.5">queued for approval.</tspan></text><rect x="380" y="376" width="3" height="36" fill="#1B3A5C"></rect><text x="390" y="390" font-size="9.5" fill="#1A1A1A" font-weight="400"><tspan x="390" dy="0">Operates across an expanding</tspan><tspan x="390" dy="11.5">set of slices as gates are</tspan><tspan x="390" dy="11.5">cleared.</tspan></text><line x1="40" y1="418" x2="536" y2="418" stroke="#DCE2E8" stroke-width="0.8"></line><text x="44" y="434" font-size="9" font-weight="700" fill="#5C6B7A" letter-spacing="0.5">HUMAN ROLE</text><g transform="translate(105,423) scale(0.625)"><circle cx="12" cy="7.4" r="4.2" fill="#5C6B7A"></circle><path d="M3.3 21C3.3 14.8 7.6 12.3 12 12.3S20.7 14.8 20.7 21Z" fill="#5C6B7A"></path></g><rect x="40" y="442" width="3" height="36" fill="#A7BBCB"></rect><text x="50" y="456" font-size="9.5" fill="#1A1A1A" font-weight="400"><tspan x="50" dy="0">Officer works as normal;</tspan><tspan x="50" dy="11.5">team compares agent output</tspan><tspan x="50" dy="11.5">to real decisions.</tspan></text><rect x="210" y="442" width="3" height="36" fill="#517391"></rect><text x="220" y="456" font-size="9.5" fill="#1A1A1A" font-weight="400"><tspan x="220" dy="0">Officer reviews and approves</tspan><tspan x="220" dy="11.5">every action before it takes</tspan><tspan x="220" dy="11.5">effect.</tspan></text><rect x="380" y="442" width="3" height="36" fill="#1B3A5C"></rect><text x="390" y="456" font-size="9.5" fill="#1A1A1A" font-weight="400"><tspan x="390" dy="0">Supervises by exception;</tspan><tspan x="390" dy="11.5">owns the go / no-go at each</tspan><tspan x="390" dy="11.5">gate.</tspan></text><rect x="40" y="484" width="496" height="56" fill="#F4F7F9"></rect><line x1="40" y1="484" x2="536" y2="484" stroke="#DCE2E8" stroke-width="0.8"></line><text x="44" y="500" font-size="9" font-weight="700" fill="#5C6B7A" letter-spacing="0.5">EVIDENCE MEASURED</text><rect x="40" y="508" width="3" height="26" fill="#A7BBCB"></rect><text x="50" y="522" font-size="9.5" fill="#1A1A1A" font-weight="400"><tspan x="50" dy="0">Agreement rate vs officers ·</tspan><tspan x="50" dy="11.5">error types · coverage.</tspan></text><rect x="210" y="508" width="3" height="26" fill="#517391"></rect><text x="220" y="522" font-size="9.5" fill="#1A1A1A" font-weight="400"><tspan x="220" dy="0">Precision on actions ·</tspan><tspan x="220" dy="11.5">override rate · time saved.</tspan></text><rect x="380" y="508" width="3" height="26" fill="#1B3A5C"></rect><text x="390" y="522" font-size="9.5" fill="#1A1A1A" font-weight="400"><tspan x="390" dy="0">Per-slice performance ·</tspan><tspan x="390" dy="11.5">incident rate · drift.</tspan></text><rect x="40" y="540" width="4" height="76" fill="#E8A33D"></rect><line x1="40" y1="540" x2="536" y2="540" stroke="#DCE2E8" stroke-width="0.8"></line><text x="48" y="556" font-size="9" font-weight="700" fill="#B77A16" letter-spacing="0.5">GATE TO ADVANCE</text><rect x="40" y="564" width="3" height="46" fill="#A7BBCB"></rect><path d="M50 574 56 579 50 584" fill="none" stroke="#E8A33D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path><text x="62" y="578" font-size="9.5" fill="#1A1A1A" font-weight="400"><tspan x="62" dy="0">Agreement and error</tspan><tspan x="62" dy="11.5">thresholds met on a</tspan><tspan x="62" dy="11.5">representative sample.</tspan></text><rect x="210" y="564" width="3" height="46" fill="#517391"></rect><path d="M220 574 226 579 220 584" fill="none" stroke="#E8A33D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path><text x="232" y="578" font-size="9.5" fill="#1A1A1A" font-weight="400"><tspan x="232" dy="0">Stable precision, low</tspan><tspan x="232" dy="11.5">override rate, no</tspan><tspan x="232" dy="11.5">material incidents.</tspan></text><rect x="380" y="564" width="3" height="46" fill="#1B3A5C"></rect><path d="M390 574 396 579 390 584" fill="none" stroke="#E8A33D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path><text x="402" y="578" font-size="9.5" fill="#1A1A1A" font-weight="400"><tspan x="402" dy="0">Each new slice meets its</tspan><tspan x="402" dy="11.5">criteria before the next</tspan><tspan x="402" dy="11.5">one opens.</tspan></text><rect x="40" y="616" width="496" height="54" fill="#F4F7F9"></rect><line x1="40" y1="616" x2="536" y2="616" stroke="#DCE2E8" stroke-width="0.8"></line><text x="44" y="632" font-size="9" font-weight="700" fill="#5C6B7A" letter-spacing="0.5">ROLLBACK</text><rect x="40" y="640" width="3" height="24" fill="#A7BBCB"></rect><text x="50" y="654" font-size="9.5" fill="#1A1A1A" font-weight="400"><tspan x="50" dy="0">None — no live effect.</tspan></text><rect x="210" y="640" width="3" height="24" fill="#517391"></rect><text x="220" y="654" font-size="9.5" fill="#1A1A1A" font-weight="400"><tspan x="220" dy="0">Revert to manual; agent</tspan><tspan x="220" dy="11.5">returns to shadow.</tspan></text><rect x="380" y="640" width="3" height="24" fill="#1B3A5C"></rect><text x="390" y="654" font-size="9.5" fill="#1A1A1A" font-weight="400"><tspan x="390" dy="0">Close the affected slice;</tspan><tspan x="390" dy="11.5">hold expansion.</tspan></text><line x1="40" y1="670" x2="536" y2="670" stroke="#5C6B7A" stroke-width="1"></line><rect x="40" y="684" width="496" height="34" rx="4" fill="#5C6B7A"></rect><rect x="40" y="684" width="5" height="34" rx="2.5" fill="#E8A33D"></rect><text x="292" y="705.5" text-anchor="middle" font-size="10.6" font-weight="600" fill="#fff" letter-spacing="0.2">Advance only through gates — evidence earns scope, and any stage can roll back.</text><text x="40" y="744" font-size="9" font-style="italic" fill="#5C6B7A">Tones borrow from the Autonomy Ladder (Ch. 2). Amber marks the human-owned gate between stages.</text></g>
</svg>