<g filter="url(#gs)"><text x="40" y="52" font-size="23" font-weight="700" fill="#1B3A5C" letter-spacing="0.3">The Adoption Funnel</text><rect x="40" y="62" width="46" height="4" rx="2" fill="#E8A33D"></rect><text x="536" y="34" text-anchor="end" font-size="9.5" font-weight="600" fill="#5C6B7A" letter-spacing="1.5">CHAPTER 1</text><text x="40" y="84" font-size="11" fill="#5C6B7A">What the sector record actually shows</text><text x="40" y="106" font-size="10" fill="#1A1A1A" font-weight="400"><tspan x="40" dy="0">Most exploration never reaches production. Route the portfolio against the record, not the</tspan><tspan x="40" dy="12.5">demo.</tspan></text><rect x="108" y="196" width="360" height="58" rx="5" fill="#A7BBCB"></rect><text x="288" y="226" font-size="26" fill="#1A1A1A" font-weight="700" text-anchor="middle">62</text><text x="288" y="244" font-size="10" fill="#1A1A1A" font-weight="400" text-anchor="middle">models explored</text><path d="M278 254 298 254 288 270Z" fill="#5C6B7A"></path><rect x="183" y="280" width="210" height="58" rx="5" fill="#517391"></rect><text x="288" y="310" font-size="26" fill="#fff" font-weight="700" text-anchor="middle">22</text><text x="288" y="328" font-size="10" fill="#fff" font-weight="400" text-anchor="middle">pilots</text><path d="M278 338 298 338 288 354Z" fill="#5C6B7A"></path><rect x="246" y="364" width="84" height="58" rx="5" fill="#1B3A5C"></rect><text x="288" y="394" font-size="26" fill="#fff" font-weight="700" text-anchor="middle">2</text><text x="288" y="412" font-size="10" fill="#fff" font-weight="400" text-anchor="middle">in production</text><text x="288" y="446" font-size="9" fill="#5C6B7A" font-weight="400" text-anchor="middle">the sector scale frontier (WCO)</text><rect x="40" y="486" width="240" height="96" rx="6" fill="#FBFCFD" stroke="#DCE2E8"></rect><rect x="40" y="486" width="4" height="96" fill="#E8A33D"></rect><text x="56" y="520" font-size="22" fill="#1B3A5C" font-weight="700">&lt; 1 in 5</text><text x="56" y="538" font-size="10" fill="#1A1A1A" font-weight="400"><tspan x="56" dy="0">organisations have scaled AI agents in</tspan><tspan x="56" dy="12.5">even one function</tspan></text><text x="56" y="574" font-size="8.5" fill="#5C6B7A" font-weight="400" font-style="italic">McKinsey, 2025</text><rect x="296" y="486" width="240" height="96" rx="6" fill="#FBFCFD" stroke="#DCE2E8"></rect><rect x="296" y="486" width="4" height="96" fill="#E8A33D"></rect><text x="312" y="520" font-size="22" fill="#1B3A5C" font-weight="700">&gt; 40%</text><text x="312" y="538" font-size="10" fill="#1A1A1A" font-weight="400"><tspan x="312" dy="0">of agentic AI projects will be cancelled</tspan><tspan x="312" dy="12.5">by end-2027</tspan></text><text x="312" y="574" font-size="8.5" fill="#5C6B7A" font-weight="400" font-style="italic">Gartner</text><text x="40" y="604" font-size="9" fill="#5C6B7A" font-weight="400" font-style="italic">One figure; the calibration line cross-referenced from Chapter 3 and Chapter 6.</text><rect x="40" y="624" width="496" height="34" rx="4" fill="#5C6B7A"></rect><rect x="40" y="624" width="5" height="34" rx="2.5" fill="#E8A33D"></rect><text x="292" y="645.5" text-anchor="middle" font-size="10.6" font-weight="600" fill="#fff" letter-spacing="0.2">The failure modes are known and governable — that is the rest of this book.</text></g>
