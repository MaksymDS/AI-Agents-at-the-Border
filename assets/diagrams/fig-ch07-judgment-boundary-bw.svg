<g filter="url(#gs)"><text x="40" y="52" font-size="23" font-weight="700" fill="#1B3A5C" letter-spacing="0.3">The Judgment Boundary</text><rect x="40" y="62" width="46" height="4" rx="2" fill="#E8A33D"></rect><text x="536" y="34" text-anchor="end" font-size="9.5" font-weight="600" fill="#5C6B7A" letter-spacing="1.5">CHAPTER 7</text><text x="40" y="84" font-size="11" fill="#5C6B7A">What to buy, what to partner on, what to own</text><text x="40" y="106" font-size="10" fill="#1A1A1A" font-weight="400"><tspan x="40" dy="0">Source the commodity, partner on the fast-moving frontier — but keep the judgment inside the</tspan><tspan x="40" dy="12.5">administration.</tspan></text><circle cx="288" cy="352" r="214" fill="#E9EDF1" stroke="#C7D1DA" stroke-width="1"></circle><circle cx="288" cy="352" r="152" fill="#517391"></circle><circle cx="288" cy="352" r="100" fill="#1B3A5C"></circle><circle cx="288" cy="352" r="104" fill="none" stroke="#E8A33D" stroke-width="2.5"></circle><text x="288" y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#1A1A1A" letter-spacing="1">BUY</text><text x="288" y="178" text-anchor="middle" font-size="8.5" fill="#5C6B7A">commodity capability</text><text x="288" y="536" text-anchor="middle" font-size="9.5" font-weight="600" fill="#1A1A1A">OCR · translation</text><text x="288" y="550" text-anchor="middle" font-size="9.5" font-weight="600" fill="#1A1A1A">infrastructure · UI</text><text x="288" y="222" text-anchor="middle" font-size="12" font-weight="700" fill="#fff" letter-spacing="1">PARTNER</text><text x="288" y="237" text-anchor="middle" font-size="8.3" fill="#DDE6EE">strategic · fast-moving frontier</text><text x="288" y="486" text-anchor="middle" font-size="8.3" fill="#DDE6EE">the build</text><text x="288" y="300" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff" letter-spacing="0.5">OWN THE</text><text x="288" y="315" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff" letter-spacing="0.5">JUDGMENT</text><text x="288" y="338" text-anchor="middle" font-size="8.6" fill="#EAF0F5">Problem framing</text><text x="288" y="353" text-anchor="middle" font-size="8.6" fill="#EAF0F5">Data &amp; logic</text><text x="288" y="368" text-anchor="middle" font-size="8.6" fill="#EAF0F5">Evaluation standard</text><text x="288" y="383" text-anchor="middle" font-size="8.6" fill="#EAF0F5">Mandate</text><text x="288" y="398" text-anchor="middle" font-size="8.6" fill="#EAF0F5">Release authority</text><rect x="40" y="600" width="496" height="34" rx="4" fill="#5C6B7A"></rect><rect x="40" y="600" width="5" height="34" rx="2.5" fill="#E8A33D"></rect><text x="292" y="621.5" text-anchor="middle" font-size="10.6" font-weight="600" fill="#fff" letter-spacing="0.2">Buy the tools · Partner on the build · Own the judgment.</text><text x="40" y="658" font-size="9" font-style="italic" fill="#5C6B7A">Amber ring marks where decision authority stays — inside the administration.</text></g>
