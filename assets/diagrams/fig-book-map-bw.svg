<g filter="url(#gs)"><text x="40" y="52" font-size="23" font-weight="700" fill="#1B3A5C" letter-spacing="0.3">Map of the Book</text><rect x="40" y="62" width="46" height="4" rx="2" fill="#E8A33D"></rect><text x="536" y="34" text-anchor="end" font-size="9.5" font-weight="600" fill="#5C6B7A" letter-spacing="1.5">AI AGENTS AT THE BORDER</text><text x="40" y="84" font-size="11" fill="#5C6B7A">Five parts, sixteen chapters, one argument</text><text x="40" y="106" font-size="10" fill="#1A1A1A" font-weight="400"><tspan x="40" dy="0">The chapters build in sequence; three frameworks thread through them all.</tspan></text><rect x="40" y="128" width="496" height="116" rx="6" fill="#FBFCFD" stroke="#DCE2E8"></rect><rect x="40" y="128" width="6" height="116" rx="3" fill="#C3D0DB"></rect><text x="56" y="194" font-size="38" fill="#C3D0DB" font-weight="300">I</text><text x="112" y="154" font-size="12" fill="#5C6B7A" font-weight="600" letter-spacing="1.5">PART I</text><text x="112" y="173" font-size="15" fill="#1B3A5C" font-weight="700">THE LANDSCAPE</text><text x="112" y="198" font-size="11" fill="#1B3A5C" font-weight="700">1</text><text x="126" y="198" font-size="10.5" fill="#1A1A1A" font-weight="400">The Customs Mandate</text><path d="M311 194 l4 -4 4 4 -4 4Z" fill="#E8A33D"></path><text x="320" y="198" font-size="11" fill="#1B3A5C" font-weight="700">2</text><text x="334" y="198" font-size="10.5" fill="#1A1A1A" font-weight="400">Rules → Models → Agents</text><path d="M103 216 l4 -4 4 4 -4 4Z" fill="#E8A33D"></path><text x="112" y="220" font-size="11" fill="#1B3A5C" font-weight="700">3</text><text x="126" y="220" font-size="10.5" fill="#1A1A1A" font-weight="400">GenAI First</text><text x="320" y="220" font-size="11" fill="#1B3A5C" font-weight="700">4</text><text x="334" y="220" font-size="10.5" fill="#1A1A1A" font-weight="400">The Opportunity Map</text><rect x="40" y="252" width="496" height="116" rx="6" fill="#FBFCFD" stroke="#DCE2E8"></rect><rect x="40" y="252" width="6" height="116" rx="3" fill="#A7BBCB"></rect><text x="56" y="318" font-size="38" fill="#A7BBCB" font-weight="300">II</text><text x="112" y="278" font-size="12" fill="#5C6B7A" font-weight="600" letter-spacing="1.5">PART II</text><text x="112" y="297" font-size="15" fill="#1B3A5C" font-weight="700">THE BUSINESS CASE</text><text x="112" y="322" font-size="11" fill="#1B3A5C" font-weight="700">5</text><text x="126" y="322" font-size="10.5" fill="#1A1A1A" font-weight="400">Value &amp; Economics</text><text x="320" y="322" font-size="11" fill="#1B3A5C" font-weight="700">6</text><text x="334" y="322" font-size="10.5" fill="#1A1A1A" font-weight="400">Readiness</text><text x="112" y="344" font-size="11" fill="#1B3A5C" font-weight="700">7</text><text x="126" y="344" font-size="10.5" fill="#1A1A1A" font-weight="400">Build · Buy · Partner</text><rect x="40" y="376" width="496" height="116" rx="6" fill="#FBFCFD" stroke="#DCE2E8"></rect><rect x="40" y="376" width="6" height="116" rx="3" fill="#7C97B0"></rect><text x="56" y="442" font-size="38" fill="#7C97B0" font-weight="300">III</text><text x="112" y="402" font-size="12" fill="#5C6B7A" font-weight="600" letter-spacing="1.5">PART III</text><text x="112" y="421" font-size="15" fill="#1B3A5C" font-weight="700">GOVERNANCE &amp; TRUST</text><text x="112" y="446" font-size="11" fill="#1B3A5C" font-weight="700">8</text><text x="126" y="446" font-size="10.5" fill="#1A1A1A" font-weight="400">Regulatory Landscape</text><path d="M311 442 l4 -4 4 4 -4 4Z" fill="#E8A33D"></path><text x="320" y="446" font-size="11" fill="#1B3A5C" font-weight="700">9</text><text x="334" y="446" font-size="10.5" fill="#1A1A1A" font-weight="400">Responsible AI</text><text x="112" y="468" font-size="11" fill="#1B3A5C" font-weight="700">10</text><text x="132" y="468" font-size="10.5" fill="#1A1A1A" font-weight="400">Security</text><text x="320" y="468" font-size="11" fill="#1B3A5C" font-weight="700">11</text><text x="340" y="468" font-size="10.5" fill="#1A1A1A" font-weight="400">Data Foundations</text><rect x="40" y="500" width="496" height="116" rx="6" fill="#FBFCFD" stroke="#DCE2E8"></rect><rect x="40" y="500" width="6" height="116" rx="3" fill="#517391"></rect><text x="56" y="566" font-size="38" fill="#517391" font-weight="300">IV</text><text x="112" y="526" font-size="12" fill="#5C6B7A" font-weight="600" letter-spacing="1.5">PART IV</text><text x="112" y="545" font-size="15" fill="#1B3A5C" font-weight="700">EXECUTION</text><text x="112" y="570" font-size="11" fill="#1B3A5C" font-weight="700">12</text><text x="132" y="570" font-size="10.5" fill="#1A1A1A" font-weight="400">The Pilot Playbook</text><text x="320" y="570" font-size="11" fill="#1B3A5C" font-weight="700">13</text><text x="340" y="570" font-size="10.5" fill="#1A1A1A" font-weight="400">Pilot → Production</text><text x="112" y="592" font-size="11" fill="#1B3A5C" font-weight="700">14</text><text x="132" y="592" font-size="10.5" fill="#1A1A1A" font-weight="400">People &amp; Organization</text><rect x="40" y="624" width="496" height="116" rx="6" fill="#FBFCFD" stroke="#DCE2E8"></rect><rect x="40" y="624" width="6" height="116" rx="3" fill="#1B3A5C"></rect><text x="56" y="690" font-size="38" fill="#1B3A5C" font-weight="300">V</text><text x="112" y="650" font-size="12" fill="#5C6B7A" font-weight="600" letter-spacing="1.5">PART V</text><text x="112" y="669" font-size="15" fill="#1B3A5C" font-weight="700">THE HORIZON</text><text x="112" y="694" font-size="11" fill="#1B3A5C" font-weight="700">15</text><text x="132" y="694" font-size="10.5" fill="#1A1A1A" font-weight="400">Case Studies</text><text x="320" y="694" font-size="11" fill="#1B3A5C" font-weight="700">16</text><text x="340" y="694" font-size="10.5" fill="#1A1A1A" font-weight="400">The Road Ahead</text><path d="M44 760 l4 -4 4 4 -4 4Z" fill="#E8A33D"></path><text x="58" y="763" font-size="9" fill="#5C6B7A" font-weight="400" font-style="italic">introduces a spine framework (Autonomy Ladder · Maturity Ladder · accountability)</text><rect x="40" y="782" width="496" height="34" rx="4" fill="#5C6B7A"></rect><rect x="40" y="782" width="5" height="34" rx="2.5" fill="#E8A33D"></rect><text x="292" y="803.5" text-anchor="middle" font-size="10.6" font-weight="600" fill="#fff" letter-spacing="0.2">Three frameworks thread through every part — and accountability never transfers.</text></g>
