<text x="40" y="52" font-size="23" font-weight="700" fill="#1B3A5C" letter-spacing="0.3">From Filings to a Network</text><rect x="40" y="62" width="46" height="4" rx="2" fill="#E8A33D"></rect><text x="536" y="34" text-anchor="end" font-size="9.5" font-weight="600" fill="#5C6B7A" letter-spacing="1.5">CHAPTER 11 · FIELD NOTE</text><text x="40" y="84" font-size="11" fill="#5C6B7A">The same declarations, read two ways</text><text x="40" y="106" font-size="10" fill="#1A1A1A" font-weight="400"><tspan x="40" dy="0">Per-declaration rules read each filing on its own. Resolve the entities and link them, and a</tspan><tspan x="40" dy="12.5">structure the rules could not see appears.</tspan></text><text x="40" y="150" font-size="10" font-weight="700" fill="#5C6B7A" letter-spacing="1">AS ISOLATED DECLARATIONS</text><text x="320" y="150" font-size="10" font-weight="700" fill="#5C6B7A" letter-spacing="1">AS A LINKED ENTITY NETWORK</text><line x1="296" y1="166" x2="296" y2="592" stroke="#DCE2E8" stroke-width="1" stroke-dasharray="5 4"></line><circle cx="296" cy="380" r="15" fill="#fff" stroke="#5C6B7A" stroke-width="1.3"></circle><path d="M290 373 297 380 290 387 M293 380 H302" fill="none" stroke="#5C6B7A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path><text transform="translate(288,540) rotate(-90)" font-size="8" font-weight="700" fill="#5C6B7A" letter-spacing="1">ENTITY RESOLUTION + GRAPH</text><rect x="40" y="170" width="232" height="132" rx="6" fill="#fff" stroke="#C7D1DA"></rect><rect x="40" y="170" width="232" height="24" rx="6" fill="#F4F7F9"></rect><rect x="40" y="182" width="232" height="12" fill="#F4F7F9"></rect><text x="52" y="186" font-size="10.5" font-weight="700" fill="#1B3A5C">Declaration A</text><text x="52" y="210" font-size="8.5" font-weight="600" fill="#5C6B7A">Importer</text><text x="120" y="210" font-size="9.5" fill="#1A1A1A">Alpha Imports Ltd</text><text x="52" y="231" font-size="8.5" font-weight="600" fill="#5C6B7A">Supplier</text><text x="120" y="231" font-size="9.5" fill="#1A1A1A">Ridge Trading</text><text x="52" y="252" font-size="8.5" font-weight="600" fill="#5C6B7A">Value</text><text x="120" y="252" font-size="9.5" fill="#1A1A1A">€82,400</text><text x="52" y="273" font-size="8.5" font-weight="600" fill="#5C6B7A">Address</text><text x="120" y="273" font-size="9.5" fill="#1A1A1A">14 Mill Rd, Unit 3</text><rect x="40" y="318" width="232" height="132" rx="6" fill="#fff" stroke="#C7D1DA"></rect><rect x="40" y="318" width="232" height="24" rx="6" fill="#F4F7F9"></rect><rect x="40" y="330" width="232" height="12" fill="#F4F7F9"></rect><text x="52" y="334" font-size="10.5" font-weight="700" fill="#1B3A5C">Declaration B</text><text x="52" y="358" font-size="8.5" font-weight="600" fill="#5C6B7A">Importer</text><text x="120" y="358" font-size="9.5" fill="#1A1A1A">Beta Sourcing</text><text x="52" y="379" font-size="8.5" font-weight="600" fill="#5C6B7A">Supplier</text><text x="120" y="379" font-size="9.5" fill="#1A1A1A">Ridge Trading</text><text x="52" y="400" font-size="8.5" font-weight="600" fill="#5C6B7A">Value</text><text x="120" y="400" font-size="9.5" fill="#1A1A1A">€76,900</text><text x="52" y="421" font-size="8.5" font-weight="600" fill="#5C6B7A">Address</text><text x="120" y="421" font-size="9.5" fill="#1A1A1A">14 Mill Rd, Unit 3</text><rect x="40" y="466" width="232" height="132" rx="6" fill="#fff" stroke="#C7D1DA"></rect><rect x="40" y="466" width="232" height="24" rx="6" fill="#F4F7F9"></rect><rect x="40" y="478" width="232" height="12" fill="#F4F7F9"></rect><text x="52" y="482" font-size="10.5" font-weight="700" fill="#1B3A5C">Declaration C</text><text x="52" y="506" font-size="8.5" font-weight="600" fill="#5C6B7A">Importer</text><text x="120" y="506" font-size="9.5" fill="#1A1A1A">Gamma Freight</text><text x="52" y="527" font-size="8.5" font-weight="600" fill="#5C6B7A">Supplier</text><text x="120" y="527" font-size="9.5" fill="#1A1A1A">Delta Supply</text><text x="52" y="548" font-size="8.5" font-weight="600" fill="#5C6B7A">Value</text><text x="120" y="548" font-size="9.5" fill="#1A1A1A">€69,500</text><text x="52" y="569" font-size="8.5" font-weight="600" fill="#5C6B7A">Address</text><text x="120" y="569" font-size="9.5" fill="#1A1A1A">14 Mill Rd, Unit 3</text><line x1="356" y1="220" x2="372" y2="330" stroke="#B7C0CA" stroke-width="1.1"></line><line x1="452" y1="206" x2="372" y2="330" stroke="#B7C0CA" stroke-width="1.1"></line><line x1="512" y1="250" x2="494" y2="340" stroke="#B7C0CA" stroke-width="1.1"></line><line x1="356" y1="220" x2="430" y2="470" stroke="#E8A33D" stroke-width="1.8"></line><line x1="452" y1="206" x2="430" y2="470" stroke="#E8A33D" stroke-width="1.8"></line><line x1="512" y1="250" x2="430" y2="470" stroke="#E8A33D" stroke-width="1.8"></line><line x1="372" y1="330" x2="430" y2="470" stroke="#B7C0CA" stroke-width="1.1"></line><line x1="494" y1="340" x2="430" y2="470" stroke="#B7C0CA" stroke-width="1.1"></line><rect x="333.25" y="209" width="45.5" height="22" rx="11" fill="#fff" stroke="#1B3A5C" stroke-width="1.2"></rect><text x="356" y="223.4" text-anchor="middle" font-size="9.5" font-weight="600" fill="#1B3A5C">Alpha</text><rect x="432" y="195" width="40" height="22" rx="11" fill="#fff" stroke="#1B3A5C" stroke-width="1.2"></rect><text x="452" y="209.4" text-anchor="middle" font-size="9.5" font-weight="600" fill="#1B3A5C">Beta</text><rect x="489.25" y="239" width="45.5" height="22" rx="11" fill="#fff" stroke="#1B3A5C" stroke-width="1.2"></rect><text x="512" y="253.4" text-anchor="middle" font-size="9.5" font-weight="600" fill="#1B3A5C">Gamma</text><rect x="327.25" y="319" width="89.5" height="22" rx="11" fill="#E9EDF1" stroke="#9FB2C4" stroke-width="1.2"></rect><text x="372" y="333.4" text-anchor="middle" font-size="9.5" font-weight="600" fill="#1A1A1A">Ridge Trading</text><rect x="452" y="329" width="84" height="22" rx="11" fill="#E9EDF1" stroke="#9FB2C4" stroke-width="1.2"></rect><text x="494" y="343.4" text-anchor="middle" font-size="9.5" font-weight="600" fill="#1A1A1A">Delta Supply</text><rect x="393.5" y="459" width="73" height="22" rx="11" fill="#E8A33D" stroke="#E8A33D" stroke-width="2"></rect><rect x="390.5" y="456" width="79" height="28" rx="14" fill="none" stroke="#E8A33D" stroke-width="1.1"></rect><text x="430" y="473.4" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1A1A1A">14 Mill Rd</text><text x="430" y="500" text-anchor="middle" font-size="8" font-weight="700" fill="#B77A16" letter-spacing="0.5">SHARED ADDRESS · RISK HUB</text><rect x="316" y="530" width="220" height="56" rx="5" fill="#FBFCFD" stroke="#DCE2E8"></rect><rect x="328" y="537" width="40" height="22" rx="11" fill="#fff" stroke="#1B3A5C" stroke-width="1.2"></rect><text x="348" y="551.4" text-anchor="middle" font-size="9.5" font-weight="600" fill="#1B3A5C">Imp.</text><text x="372" y="551" font-size="8.3" fill="#1A1A1A">importer</text><rect x="432" y="537" width="40" height="22" rx="11" fill="#E9EDF1" stroke="#9FB2C4" stroke-width="1.2"></rect><text x="452" y="551.4" text-anchor="middle" font-size="9.5" font-weight="600" fill="#1A1A1A">Sup.</text><text x="476" y="551" font-size="8.3" fill="#1A1A1A">supplier</text><rect x="330" y="564" width="14" height="10" rx="5" fill="#E8A33D"></rect><text x="350" y="573" font-size="8.3" fill="#1A1A1A">resolved shared entity (the hub)</text><text x="40" y="608" font-size="9.5" fill="#5C6B7A" font-weight="400" font-style="italic"><tspan x="40" dy="0">Per-declaration rules see three separate</tspan><tspan x="40" dy="12">filings.</tspan></text><text x="316" y="608" font-size="9.5" fill="#5C6B7A" font-weight="400" font-style="italic"><tspan x="316" dy="0">Entity resolution exposes the ring the rules</tspan><tspan x="316" dy="12">missed.</tspan></text><rect x="40" y="648" width="496" height="34" rx="4" fill="#5C6B7A"></rect><rect x="40" y="648" width="5" height="34" rx="2.5" fill="#E8A33D"></rect><text x="292" y="669.5" text-anchor="middle" font-size="10.6" font-weight="600" fill="#fff" letter-spacing="0.2">Same data, different structure — the graph reveals what per-filing rules cannot.</text><text x="40" y="702" font-size="9" font-style="italic" fill="#5C6B7A">Amber marks the shared entity that only becomes visible once declarations are resolved and linked.</text>
