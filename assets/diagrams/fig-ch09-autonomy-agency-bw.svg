<g filter="url(#gs)"><text x="40" y="52" font-size="23" font-weight="700" fill="#1B3A5C" letter-spacing="0.3">Autonomy × Agency</text><rect x="40" y="62" width="46" height="4" rx="2" fill="#E8A33D"></rect><text x="536" y="34" text-anchor="end" font-size="9.5" font-weight="600" fill="#5C6B7A" letter-spacing="1.5">CHAPTER 9</text><text x="40" y="84" font-size="11" fill="#5C6B7A">Two independent dials, set on purpose</text><text x="40" y="106" font-size="10" fill="#1A1A1A" font-weight="400"><tspan x="40" dy="0">Autonomy is how independently a system acts; agency is how much it can touch. Grant each</tspan><tspan x="40" dy="12.5">deliberately.</tspan></text><defs><clipPath id="tr"><rect x="328" y="210" width="172" height="172"></rect></clipPath></defs><rect x="156" y="210" width="172" height="172" fill="#F4F7F9"></rect><rect x="328" y="210" width="172" height="172" fill="#FBF3E6"></rect><rect x="156" y="382" width="172" height="172" fill="#F7F9FA"></rect><rect x="328" y="382" width="172" height="172" fill="#F4F7F9"></rect><g clip-path="url(#tr)"><line x1="-16" y1="210" x2="328" y2="554" stroke="#E8A33D" stroke-width="0.7" opacity="0.42"></line><line x1="-7" y1="210" x2="337" y2="554" stroke="#E8A33D" stroke-width="0.7" opacity="0.42"></line><line x1="2" y1="210" x2="346" y2="554" stroke="#E8A33D" stroke-width="0.7" opacity="0.42"></line><line x1="11" y1="210" x2="355" y2="554" stroke="#E8A33D" stroke-width="0.7" opacity="0.42"></line><line x1="20" y1="210" x2="364" y2="554" stroke="#E8A33D" stroke-width="0.7" opacity="0.42"></line><line x1="29" y1="210" x2="373" y2="554" stroke="#E8A33D" stroke-width="0.7" opacity="0.42"></line><line x1="38" y1="210" x2="382" y2="554" stroke="#E8A33D" stroke-width="0.7" opacity="0.42"></line><line x1="47" y1="210" x2="391" y2="554" stroke="#E8A33D" stroke-width="0.7" opacity="0.42"></line><line x1="56" y1="210" x2="400" y2="554" stroke="#E8A33D" stroke-width="0.7" opacity="0.42"></line><line x1="65" y1="210" x2="409" y2="554" stroke="#E