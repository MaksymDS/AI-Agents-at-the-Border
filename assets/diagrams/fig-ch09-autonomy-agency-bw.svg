3D" stroke-width="0.7" opacity="0.42"></line><line x1="614" y1="210" x2="958" y2="554" stroke="#E8A33D" stroke-width="0.7" opacity="0.42"></line><line x1="623" y1="210" x2="967" y2="554" stroke="#E8A33D" stroke-width="0.7" opacity="0.42"></line><line x1="632" y1="210" x2="976" y2="554" stroke="#E8A33D" stroke-width="0.7" opacity="0.42"></line><line x1="641" y1="210" x2="985" y2="554" stroke="#E8A33D" stroke-width="0.7" opacity="0.42"></line><line x1="650" y1="210" x2="994" y2="554" stroke="#E8A33D" stroke-width="0.7" opacity="0.42"></line><line x1="659" y1="210" x2="1003" y2="554" stroke="#E8A33D" stroke-width="0.7" opacity="0.42"></line><line x1="668" y1="210" x2="1012" y2="554" stroke="#E8A33D" stroke-width="0.7" opacity="0.42"></line></g><rect x="156" y="210" width="344" height="344" fill="none" stroke="#5C6B7A" stroke-width="1.2"></rect><line x1="328" y1="210" x2="328" y2="554" stroke="#5C6B7A" stroke-width="0.8"></line><line x1="156" y1="382" x2="500" y2="382" stroke="#5C6B7A" stroke-width="0.8"></line><text x="170" y="236" font-size="10.5" fill="#1B3A5C" font-weight="700">Scoped autonomy</text><text x="170" y="250" font-size="8.8" fill="#1A1A1A" font-weight="400">Green-channel clearance: L4, but</text><text x="170" y="260.5" font-size="8.8" fill="#1A1A1A" font-weight="400">a tiny reversible action set.</text><text x="342" y="236" font-size="10.5" fill="#B77A16" font-weight="700">⚠  Danger</text><text x="342" y="250" font-size="8.8" fill="#1A1A1A" font-weight="400">High agency + high autonomy: the</text><text x="342" y="260.5" font-size="8.8" fill="#1A1A1A" font-weight="400">demo that impresses, the</text><text x="342" y="271" font-size="8.8" fill="#1A1A1A" font-weight="400">incident that follows.</text><text x="170" y="408" font-size="10.5" fill="#1B3A5C" font-weight="700">The expensive chatbot</text><text x="170" y="422" font-size="8.8" fill="#1A1A1A" font-weight="400">Low agency + low autonomy: cost</text><text x="170" y="432.5" font-size="8.8" fill="#1A1A1A" font-weight="400">without capability.</text><text x="342" y="408" font-size="10.5" fill="#1B3A5C" font-weight="700">Investigation agent</text><text x="342" y="422" font-size="8.8" fill="#1A1A1A" font-weight="400">Broad read-access, but checks in</text><text x="342" y="432.5" font-size="8.8" fill="#1A1A1A" font-weight="400">before anything consequential.</text><line x1="140" y1="554" x2="140" y2="206" stroke="#5C6B7A" stroke-width="1.2"></line><path d="M136 214 L140 204 L144 214Z" fill="#5C6B7A"></path><text x="126" y="382" font-size="9.5" fill="#5C6B7A" font-weight="700" letter-spacing="0.5" text-anchor="middle" transform="rotate(-90 126 382)">AUTONOMY (independence)</text><text x="150" y="216" font-size="8" fill="#5C6B7A" font-weight="400" text-anchor="end">high</text><text x="150" y="554" font-size="8" fill="#5C6B7A" font-weight="400" text-anchor="end">low</text><line x1="156" y1="570" x2="504" y2="570" stroke="#5C6B7A" stroke-width="1.2"></line><path d="M496 566 L506 570 L496 574Z" fill="#5C6B7A"></path><text x="328" y="588" font-size="9.5" fill="#5C6B7A" font-weight="700" letter-spacing="0.5" text-anchor="middle">AGENCY (tool reach)</text><text x="156" y="588" font-size="8" fill="#5C6B7A" font-weight="400">low</text><text x="500" y="588" font-size="8" fill="#5C6B7A" font-weight="400" text-anchor="end">high</text><rect x="40" y="614" width="496" height="34" rx="4" fill="#5C6B7A"></rect><rect x="40" y="614" width="5" height="34" rx="2.5" fill="#E8A33D"></rect><text x="292" y="635.5" text-anchor="middle" font-size="10.6" font-weight="600" fill="#fff" letter-spacing="0.2">Grant capability or independence deliberately — never both by default.</text></g>
</svg>