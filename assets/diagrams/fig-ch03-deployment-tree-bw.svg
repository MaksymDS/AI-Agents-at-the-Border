<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 792" width="576" height="792">
<defs><filter id="gs"><feColorMatrix type="saturate" values="0"></feColorMatrix></filter></defs>
<rect width="576" height="864" fill="#fff"></rect>
<g filter="url(#gs)"><text x="40" y="52" font-size="23" font-weight="700" fill="#1B3A5C" letter-spacing="0.3">Deployment Decision Tree</text><rect x="40" y="62" width="46" height="4" rx="2" fill="#E8A33D"></rect><text x="536" y="34" text-anchor="end" font-size="9.5" font-weight="600" fill="#5C6B7A" letter-spacing="1.5">CHAPTER 3 / 10</text><text x="40" y="84" font-size="11" fill="#5C6B7A">Matching the environment to data sensitivity</text><text x="40" y="106" font-size="10" fill="#1A1A1A" font-weight="400"><tspan x="40" dy="0">Match the environment to the most sensitive data the system can access — not the average case.</tspan></text><line x1="54" y1="180" x2="54" y2="512" stroke="#E8A33D" stroke-width="2"></line><path d="M50 512 54 522 58 512Z" fill="#E8A33D"></path><text transform="translate(30,470) rotate(-90)" font-size="8.5" font-weight="700" fill="#E8A33D" letter-spacing="1.5">DATA SENSITIVITY</text><rect x="74" y="176" width="172" height="100" rx="8" fill="#A7BBCB"></rect><text x="88" y="202" font-size="11.5" font-weight="700" fill="#1A1A1A">Public / published data</text><text x="88" y="223" font-size="8.5" fill="#1A1A1A" opacity="0.85">e.g. tariff schedules, public</text><text x="88" y="234" font-size="8.5" fill="#1A1A1A" opacity="0.85">notices</text><line x1="246" y1="226" x2="272" y2="226" stroke="#5C6B7A" stroke-width="1.5"></line><path d="M272 222 280 226 272 230Z" fill="#5C6B7A"></path><rect x="282" y="176" width="254" height="100" rx="8" fill="#fff" stroke="#DCE2E8"></rect><rect x="282" y="176" width="6" height="100" rx="3" fill="#A7BBCB"></rect><text x="300" y="194" font-size="7.5" font-weight="700" fill="#5C6B7A" letter-spacing="1">RECOMMENDED</text><text x="300" y="214" font-size="12.5" font-weight="700" fill="#1B3A5C">Hybrid — vetted commercial cloud</text><text x="300" y="235" font-size="9" fill="#1A1A1A">Cost and scale benefits, under data-handling</text><text x="300" y="246.5" font-size="9" fill="#1A1A1A">agreements and government controls.</text><rect x="74" y="296" width="172" height="100" rx="8" fill="#517391"></rect><text x="88" y="322" font-size="11.5" font-weight="700" fill="#fff">Official / commercially</text><text x="88" y="337" font-size="11.5" font-weight="700" fill="#fff">sensitive</text><text x="88" y="358" font-size="8.5" fill="#fff" opacity="0.85">e.g. trader data, declarations,</text><text x="88" y="369" font-size="8.5" fill="#fff" opacity="0.85">valuations</text><line x1="246" y1="346" x2="272" y2="346" stroke="#5C6B7A" stroke-width="1.5"></line><path d="M272 342 280 346 272 350Z" fill="#5C6B7A"></path><rect x="282" y="296" width="254" height="100" rx="8" fill="#fff" stroke="#DCE2E8"></rect><rect x="282" y="296" width="6" height="100" rx="3" fill="#517391"></rect><text x="300" y="314" font-size="7.5" font-weight="700" fill="#5C6B7A" letter-spacing="1">RECOMMENDED</text><text x="300" y="334" font-size="12.5" font-weight="700" fill="#1B3A5C">Sovereign government cloud</text><text x="300" y="355" font-size="9" fill="#1A1A1A">Keeps regulated data in-jurisdiction, in an</text><text x="300" y="366.5" font-size="9" fill="#1A1A1A">accredited national environment.</text><rect x="74" y="416" width="172" height="100" rx="8" fill="#1B3A5C"></rect><text x="88" y="442" font-size="11.5" font-weight="700" fill="#fff">Personal, enforcement or</text><text x="88" y="457" font-size="11.5" font-weight="700" fill="#fff">classified</text><text x="88" y="478" font-size="8.5" fill="#fff" opacity="0.85">e.g. PNR, intelligence, seizure</text><text x="88" y="489" font-size="8.5" fill="#fff" opacity="0.85">records</text><line x1="246" y1="466" x2="272" y2="466" stroke="#5C6B7A" stroke-width="1.5"></line><path d="M272 462 280 466 272 470Z" fill="#5C6B7A"></path><rect x="282" y="416" width="254" height="100" rx="8" fill="#fff" stroke="#DCE2E8"></rect><rect x="282" y="416" width="6" height="100" rx="3" fill="#1B3A5C"></rect><text x="300" y="434" font-size="7.5" font-weight="700" fill="#5C6B7A" letter-spacing="1">RECOMMENDED</text><text x="300" y="454" font-size="12.5" font-weight="700" fill="#1B3A5C">On-premises / sovereign</text><text x="300" y="469" font-size="12.5" font-weight="700" fill="#1B3A5C">infrastructure</text><text x="300" y="490" font-size="9" fill="#1A1A1A">Maximum control and isolation; no external</text><text x="300" y="501.5" font-size="9" fill="#1A1A1A">dependency.</text><rect x="40" y="534" width="496" height="182" rx="8" fill="#F1F3F5" stroke="#5C6B7A" stroke-width="1.3" stroke-dasharray="5 4"></rect><line x1="46" y1="542" x2="530" y2="708" stroke="#5C6B7A" stroke-width="1" opacity="0.14"></line><line x1="530" y1="542" x2="46" y2="708" stroke="#5C6B7A" stroke-width="1" opacity="0.14"></line><rect x="40" y="534" width="150" height="26" rx="8" fill="#5C6B7A"></rect><rect x="40" y="547" width="150" height="13" fill="#5C6B7A"></rect><text x="54" y="551" font-size="10" font-weight="700" fill="#fff" letter-spacing="1.2">EXCLUDED TERRITORY</text><text x="528" y="552" font-size="9.5" font-style="italic" fill="#5C6B7A" text-anchor="end">never for official customs data</text><circle cx="58" cy="579" r="1.9" fill="#5C6B7A"></circle><text x="68" y="582" font-size="10" fill="#5C6B7A">Consumer AI subscriptions (public chatbots)</text><line x1="68" y1="579" x2="300.20000000000005" y2="579" stroke="#5C6B7A" stroke-width="1"></line><circle cx="58" cy="599" r="1.9" fill="#5C6B7A"></circle><text x="68" y="602" font-size="10" fill="#5C6B7A">Unvetted public APIs and shadow IT</text><line x1="68" y1="599" x2="251.60000000000002" y2="599" stroke="#5C6B7A" stroke-width="1"></line><circle cx="58" cy="619" r="1.9" fill="#5C6B7A"></circle><text x="68" y="622" font-size="10" fill="#5C6B7A">Any service with no data-processing agreement, audit trail or sovereignty guarantee</text><line x1="68" y1="619" x2="516.2" y2="619" stroke="#5C6B7A" stroke-width="1"></line><text x="58" y="702" font-size="9" font-style="italic" fill="#5C6B7A">No sovereignty. No audit trail. Your data may train someone else&#39;s model — so it never enters the decision.</text><rect x="40" y="730" width="496" height="34" rx="4" fill="#5C6B7A"></rect><rect x="40" y="730" width="5" height="34" rx="2.5" fill="#E8A33D"></rect><text x="292" y="751.5" text-anchor="middle" font-size="10.6" font-weight="600" fill="#fff" letter-spacing="0.2">When in doubt, treat the data as one tier more sensitive.</text></g>
</svg>