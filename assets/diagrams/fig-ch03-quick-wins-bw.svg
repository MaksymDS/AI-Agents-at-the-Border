<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 816" width="576" height="816">
<defs><filter id="gs"><feColorMatrix type="saturate" values="0"></feColorMatrix></filter></defs>
<rect width="576" height="864" fill="#fff"></rect>
<g filter="url(#gs)"><text x="40" y="52" font-size="23" font-weight="700" fill="#1B3A5C" letter-spacing="0.3">The Quick-Wins Catalog</text><rect x="40" y="62" width="46" height="4" rx="2" fill="#E8A33D"></rect><text x="536" y="34" text-anchor="end" font-size="9.5" font-weight="600" fill="#5C6B7A" letter-spacing="1.5">CHAPTER 3</text><text x="40" y="84" font-size="11" fill="#5C6B7A">Five workloads that pay back fastest</text><text x="40" y="106" font-size="10" fill="#1A1A1A" font-weight="400"><tspan x="40" dy="0">Each is Rung 1–2, and each ships with a verification design — because GenAI’s failure is fluent</tspan><tspan x="40" dy="12.5">error.</tspan></text><rect x="40" y="140" width="496" height="112" rx="6" fill="#FBFCFD" stroke="#DCE2E8"></rect><rect x="40" y="140" width="64" height="112" rx="6" fill="#A7BBCB"></rect><rect x="92" y="140" width="12" height="112" fill="#A7BBCB"></rect><text x="72" y="180" font-size="26" fill="#fff" font-weight="700" text-anchor="middle">1</text><text x="72" y="206" font-size="12" fill="#fff" font-weight="700" text-anchor="middle">L2</text><text x="72" y="220" font-size="7.5" fill="#DDE6EE" font-weight="400" letter-spacing="0.5" text-anchor="middle">RUNG</text><text x="118" y="166" font-size="13" fill="#1B3A5C" font-weight="700">Declaration-support extraction</text><text x="118" y="186" font-size="9.8" fill="#1A1A1A" font-weight="400"><tspan x="118" dy="0">Reads invoices, bills of lading, certificates; reconciles to the declaration.</tspan></text><text x="118" y="212" font-size="8" fill="#B77A16" font-weight="700" letter-spacing="0.8">VERIFY</text><rect x="118" y="205" width="3" height="34" fill="#E8A33D"></rect><text x="162" y="212" font-size="9.3" fill="#5C6B7A" font-weight="400"><tspan x="162" dy="0">Fields shown beside the source image; officer confirms; discrepancies</tspan><tspan x="162" dy="11.5">flagged.</tspan></text><rect x="40" y="258" width="496" height="112" rx="6" fill="#FBFCFD" stroke="#DCE2E8"></rect><rect x="40" y="258" width="64" height="112" rx="6" fill="#A7BBCB"></rect><rect x="92" y="258" width="12" height="112" fill="#A7BBCB"></rect><text x="72" y="298" font-size="26" fill="#fff" font-weight="700" text-anchor="middle">2</text><text x="72" y="324" font-size="12" fill="#fff" font-weight="700" text-anchor="middle">L2</text><text x="72" y="338" font-size="7.5" fill="#DDE6EE" font-weight="400" letter-spacing="0.5" text-anchor="middle">RUNG</text><text x="118" y="284" font-size="13" fill="#1B3A5C" font-weight="700">Regulation &amp; ruling search</text><rect x="318.4" y="273" width="98" height="15" rx="7.5" fill="#E8A33D"></rect><text x="367.4" y="284" font-size="8" fill="#1A1A1A" font-weight="700" text-anchor="middle">HIGHEST LEVERAGE</text><text x="118" y="304" font-size="9.8" fill="#1A1A1A" font-weight="400"><tspan x="118" dy="0">Citation-backed answers over tariffs, rulings and circulars</tspan><tspan x="118" dy="12">(retrieval-augmented).</tspan></text><text x="118" y="342" font-size="8" fill="#B77A16" font-weight="700" letter-spacing="0.8">VERIFY</text><rect x="118" y="335" width="3" height="22" fill="#E8A33D"></rect><text x="162" y="342" font-size="9.3" fill="#5C6B7A" font-weight="400"><tspan x="162" dy="0">The citation is the check — no source shows “no grounded answer,” never</tspan><tspan x="162" dy="11.5">improvised.</tspan></text><rect x="40" y="376" width="496" height="112" rx="6" fill="#FBFCFD" stroke="#DCE2E8"></rect><rect x="40" y="376" width="64" height="112" rx="6" fill="#E9EDF1"></rect><rect x="92" y="376" width="12" height="112" fill="#E9EDF1"></rect><text x="72" y="416" font-size="26" fill="#1B3A5C" font-weight="700" text-anchor="middle">3</text><text x="72" y="442" font-size="12" fill="#1B3A5C" font-weight="700" text-anchor="middle">L1</text><text x="72" y="456" font-size="7.5" fill="#5C6B7A" font-weight="400" letter-spacing="0.5" text-anchor="middle">RUNG</text><text x="118" y="402" font-size="13" fill="#1B3A5C" font-weight="700">Trader correspondence drafting</text><text x="118" y="422" font-size="9.8" fill="#1A1A1A" font-weight="400"><tspan x="118" dy="0">First drafts of replies, RFIs and deficiency notices, grounded in the corpus.</tspan></text><text x="118" y="448" font-size="8" fill="#B77A16" font-weight="700" letter-spacing="0.8">VERIFY</text><rect x="118" y="441" width="3" height="34" fill="#E8A33D"></rect><text x="162" y="448" font-size="9.3" fill="#5C6B7A" font-weight="400"><tspan x="162" dy="0">Officer review before send; templates constrain tone and legal phrasing.</tspan></text><rect x="40" y="494" width="496" height="112" rx="6" fill="#FBFCFD" stroke="#DCE2E8"></rect><rect x="40" y="494" width="64" height="112" rx="6" fill="#E9EDF1"></rect><rect x="92" y="494" width="12" height="112" fill="#E9EDF1"></rect><text x="72" y="534" font-size="26" fill="#1B3A5C" font-weight="700" text-anchor="middle">4</text><text x="72" y="560" font-size="12" fill="#1B3A5C" font-weight="700" text-anchor="middle">L1</text><text x="72" y="574" font-size="7.5" fill="#5C6B7A" font-weight="400" letter-spacing="0.5" text-anchor="middle">RUNG</text><text x="118" y="520" font-size="13" fill="#1B3A5C" font-weight="700">Multilingual processing</text><text x="118" y="540" font-size="9.8" fill="#1A1A1A" font-weight="400"><tspan x="118" dy="0">Translation and cross-lingual extraction across the real language mix.</tspan></text><text x="118" y="566" font-size="8" fill="#B77A16" font-weight="700" letter-spacing="0.8">VERIFY</text><rect x="118" y="559" width="3" height="34" fill="#E8A33D"></rect><text x="162" y="566" font-size="9.3" fill="#5C6B7A" font-weight="400"><tspan x="162" dy="0">Original shown alongside; legally consequential passages flagged for a</tspan><tspan x="162" dy="11.5">human.</tspan></text><rect x="40" y="612" width="496" height="112" rx="6" fill="#FBFCFD" stroke="#DCE2E8"></rect><rect x="40" y="612" width="64" height="112" rx="6" fill="#A7BBCB"></rect><rect x="92" y="612" width="12" height="112" fill="#A7BBCB"></rect><text x="72" y="652" font-size="26" fill="#fff" font-weight="700" text-anchor="middle">5</text><text x="72" y="678" font-size="12" fill="#fff" font-weight="700" text-anchor="middle">L2</text><text x="72" y="692" font-size="7.5" fill="#DDE6EE" font-weight="400" letter-spacing="0.5" text-anchor="middle">RUNG</text><text x="118" y="638" font-size="13" fill="#1B3A5C" font-weight="700">Case-file summarization</text><text x="118" y="658" font-size="9.8" fill="#1A1A1A" font-weight="400"><tspan x="118" dy="0">Condenses an audit or investigation file into a structured brief.</tspan></text><text x="118" y="684" font-size="8" fill="#B77A16" font-weight="700" letter-spacing="0.8">VERIFY</text><rect x="118" y="677" width="3" height="34" fill="#E8A33D"></rect><text x="162" y="684" font-size="9.3" fill="#5C6B7A" font-weight="400"><tspan x="162" dy="0">Every statement links back to its source page — the same grounding</tspan><tspan x="162" dy="11.5">discipline.</tspan></text><rect x="40" y="736" width="496" height="34" rx="4" fill="#5C6B7A"></rect><rect x="40" y="736" width="5" height="34" rx="2.5" fill="#E8A33D"></rect><text x="292" y="757.5" text-anchor="middle" font-size="10.6" font-weight="600" fill="#fff" letter-spacing="0.2">Each fails safely — a wrong draft costs minutes, not a seizure or a lawsuit.</text></g>
</svg>