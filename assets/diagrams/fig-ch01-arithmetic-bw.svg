<g filter="url(#gs)"><text x="40" y="52" font-size="23" font-weight="700" fill="#1B3A5C" letter-spacing="0.3">The Arithmetic</text><rect x="40" y="62" width="46" height="4" rx="2" fill="#E8A33D"></rect><text x="536" y="34" text-anchor="end" font-size="9.5" font-weight="600" fill="#5C6B7A" letter-spacing="1.5">CHAPTER 1</text><text x="40" y="84" font-size="11" fill="#5C6B7A">Why the mandate now needs more than headcount</text><text x="40" y="106" font-size="10" fill="#1A1A1A" font-weight="400"><tspan x="40" dy="0">Transaction volume grows far faster than any workforce plan. The widening gap is the case for</tspan><tspan x="40" dy="12.5">AI.</tspan></text><rect x="96" y="188" width="418" height="330" fill="#FCFDFE" stroke="#5C6B7A" stroke-width="1.1"></rect><line x1="114" y1="417.5" x2="500" y2="417.5" stroke="#DCE2E8" stroke-width="0.7"></line><text x="108" y="420.5" font-size="8" fill="#5C6B7A" font-weight="400">50</text><line x1="114" y1="347" x2="500" y2="347" stroke="#DCE2E8" stroke-width="0.7"></line><text x="108" y="350" font-size="8" fill="#5C6B7A" font-weight="400">100</text><line x1="114" y1="276.5" x2="500" y2="276.5" stroke="#DCE2E8" stroke-width="0.7"></line><text x="108" y="279.5" font-size="8" fill="#5C6B7A" font-weight="400">150</text><line x1="114" y1="206" x2="500" y2="206" stroke="#DCE2E8" stroke-width="0.7"></line><text x="108" y="209" font-size="8" fill="#5C6B7A" font-weight="400">200</text><path d="M114 397.76 C 264 378.02, 350 276.5, 500 232.79" fill="none" stroke="#1B3A5C" stroke-width="2.6"></path><circle cx="114" cy="397.76" r="4" fill="#1B3A5C"></circle><circle cx="500" cy="232.79" r="4" fill="#1B3A5C"></circle><text x="118" y="413.76" font-size="9.5" fill="#1B3A5C" font-weight="700">64M</text><text x="496" y="224.79" font-size="10.5" fill="#1B3A5C" font-weight="700" text-anchor="end">181M</text><text x="496" y="210.79" font-size="9" fill="#5C6B7A" font-weight="400" text-anchor="end">e-commerce shipments</text><line x1="114" y1="406.22" x2="500" y2="406.22" stroke="#5C6B7A" stroke-width="2" stroke-dasharray="5 3"></line><text x="118" y="422.22" font-size="9.5" fill="#5C6B7A" font-weight="400">officers — flat</text><line x1="498" y1="232.79" x2="498" y2="406.22" stroke="#E8A33D" stroke-width="2.5"></line><path d="M494 236.79 l4 -6 4 6M494 402.22 l4 6 4 -6" fill="none" stroke="#E8A33D" stroke-width="2"></path><text x="488" y="319.505" font-size="9" fill="#B77A16" font-weight="700" text-anchor="end">the gap</text><text x="488" y="331.505" font-size="8.5" fill="#B77A16" font-weight="400" text-anchor="end">AI must close</text><text x="265" y="252" font-size="30" fill="#E8A33D" font-weight="700">2.85×</text><text x="265" y="268" font-size="9" fill="#5C6B7A" font-weight="400">volume, in five years</text><text x="305" y="508" font-size="9" fill="#5C6B7A" font-weight="400" text-anchor="middle">five years  ·  Korea Customs Service</text><text x="96" y="540" font-size="8.5" fill="#5C6B7A" font-weight="400" font-style="italic">Verified · administration-stated (KCS, WCO News 108).</text><rect x="40" y="560" width="496" height="34" rx="4" fill="#5C6B7A"></rect><rect x="40" y="560" width="5" height="34" rx="2.5" fill="#E8A33D"></rect><text x="292" y="581.5" text-anchor="middle" font-size="10.6" font-weight="600" fill="#fff" letter-spacing="0.2">Volume outgrows any workforce plan — the gap is the case for AI.</text></g>
