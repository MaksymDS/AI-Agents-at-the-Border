  <text x="536" y="34" text-anchor="end" font-size="9.5" font-weight="600" fill="#5C6B7A" letter-spacing="1.5">FIGURE 15.1</text>
  <text x="40" y="84" font-size="11" fill="#5C6B7A">Seven administrations, one reading protocol</text>
  <text x="40" y="106" font-size="10" fill="#1A1A1A" font-weight="400">
