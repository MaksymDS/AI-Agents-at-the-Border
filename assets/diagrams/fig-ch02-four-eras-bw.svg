<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 480" width="576" height="480">
<defs><filter id="gs"><feColorMatrix type="saturate" values="0"></feColorMatrix></filter></defs>
<rect width="576" height="864" fill="#fff"></rect>
<g filter="url(#gs)"><text x="40" y="52" font-size="23" font-weight="700" fill="#1B3A5C" letter-spacing="0.3">Four Eras in One Page</text><rect x="40" y="62" width="46" height="4" rx="2" fill="#E8A33D"></rect><text x="536" y="34" text-anchor="end" font-size="9.5" font-weight="600" fill="#5C6B7A" letter-spacing="1.5">CHAPTER 2</text><text x="40" y="84" font-size="11" fill="#5C6B7A">How customs AI actually stacks up</text><text x="40" y="106" font-size="10" fill="#1A1A1A" font-weight="400"><tspan x="40" dy="0">Each generation solved the last one’s ceiling. Modern systems run several at once.</tspan></text><rect x="40" y="182" width="112" height="176" rx="5" fill="#E9EDF1"></rect><rect x="50" y="193" width="22" height="20" rx="4" fill="#fff" stroke="#C7D1DA"></rect><text x="61" y="208" font-size="12" fill="#1B3A5C" font-weight="700" text-anchor="middle">1</text><text x="80" y="208" font-size="8" fill="#1A1A1A" font-weight="600">1980s →</text><text x="51" y="230" font-size="12" fill="#1A1A1A" font-weight="700">Rules</text><text x="51" y="272" font-size="10" fill="#1A1A1A" font-weight="700">+</text><text x="62" y="272" font-size="8.5" fill="#1A1A1A" font-weight="400"><tspan x="62" dy="0">Transparent,</tspan><tspan x="62" dy="10.5">auditable, cheap</tspan></text><text x="51" y="324" font-size="10" fill="#1A1A1A" font-weight="700">−</text><text x="62" y="324" font-size="8.5" fill="#1A1A1A" font-weight="400"><tspan x="62" dy="0">Brittle; fraud</tspan><tspan x="62" dy="10.5">learns to route</tspan><tspan x="62" dy="10.5">around</tspan></text><rect x="168" y="182" width="112" height="176" rx="5" fill="#A7BBCB"></rect><rect x="178" y="193" width="22" height="20" rx="4" fill="#fff" stroke="#C7D1DA"></rect><text x="189" y="208" font-size="12" fill="#1B3A5C" font-weight="700" text-anchor="middle">2</text><text x="208" y="208" font-size="8" fill="#1A1A1A" font-weight="600">2000s →</text><text x="179" y="230" font-size="12" fill="#1A1A1A" font-weight="700">Machine</text><text x="179" y="244" font-size="12" fill="#1A1A1A" font-weight="700">learning</text><text x="179" y="272" font-size="10" fill="#1A1A1A" font-weight="700">+</text><text x="190" y="272" font-size="8.5" fill="#1A1A1A" font-weight="400"><tspan x="190" dy="0">Finds patterns no</tspan><tspan x="190" dy="10.5">one wrote</tspan></text><text x="179" y="324" font-size="10" fill="#1A1A1A" font-weight="700">−</text><text x="190" y="324" font-size="8.5" fill="#1A1A1A" font-weight="400"><tspan x="190" dy="0">Opaque scores;</tspan><tspan x="190" dy="10.5">only as good as</tspan><tspan x="190" dy="10.5">its data</tspan></text><rect x="296" y="182" width="112" height="176" rx="5" fill="#517391"></rect><rect x="306" y="193" width="22" height="20" rx="4" fill="#fff" stroke="none"></rect><text x="317" y="208" font-size="12" fill="#1B3A5C" font-weight="700" text-anchor="middle">3</text><text x="336" y="208" font-size="8" fill="#fff" font-weight="600">2022 →</text><text x="307" y="230" font-size="12" fill="#fff" font-weight="700">Generative AI</text><text x="307" y="272" font-size="10" fill="#fff" font-weight="700">+</text><text x="318" y="272" font-size="8.5" fill="#fff" font-weight="400"><tspan x="318" dy="0">Reads unstructured</tspan><tspan x="318" dy="10.5">documents</tspan></text><text x="307" y="324" font-size="10" fill="#fff" font-weight="700">−</text><text x="318" y="324" font-size="8.5" fill="#fff" font-weight="400"><tspan x="318" dy="0">Fluent error —</tspan><tspan x="318" dy="10.5">confident and</tspan><tspan x="318" dy="10.5">wrong</tspan></text><rect x="424" y="182" width="112" height="176" rx="5" fill="#1B3A5C"></rect><rect x="434" y="193" width="22" height="20" rx="4" fill="#fff" stroke="none"></rect><text x="445" y="208" font-size="12" fill="#1B3A5C" font-weight="700" text-anchor="middle">4</text><text x="464" y="208" font-size="8" fill="#fff" font-weight="600">2024 →</text><text x="435" y="230" font-size="12" fill="#fff" font-weight="700">AI agents</text><text x="435" y="272" font-size="10" fill="#fff" font-weight="700">+</text><text x="446" y="272" font-size="8.5" fill="#fff" font-weight="400"><tspan x="446" dy="0">Does the work;</tspan><tspan x="446" dy="10.5">takes actions</tspan></text><text x="435" y="324" font-size="10" fill="#fff" font-weight="700">−</text><text x="446" y="324" font-size="8.5" fill="#fff" font-weight="400"><tspan x="446" dy="0">Needs oversight</tspan><tspan x="446" dy="10.5">and security by</tspan><tspan x="446" dy="10.5">design</tspan></text><line x1="40" y1="380" x2="516" y2="380" stroke="#E8A33D" stroke-width="2"></line><path d="M516 376 526 380 516 384Z" fill="#E8A33D"></path><text x="40" y="372" font-size="8.5" fill="#E8A33D" font-weight="700" letter-spacing="1.2">EARLY ADOPTION THROUGH TODAY</text><rect x="40" y="410" width="496" height="34" rx="4" fill="#5C6B7A"></rect><rect x="40" y="410" width="5" height="34" rx="2.5" fill="#E8A33D"></rect><text x="292" y="431.5" text-anchor="middle" font-size="10.6" font-weight="600" fill="#fff" letter-spacing="0.2">Well-designed systems stack the eras — the agent orchestrates, it does not replace.</text></g>
</svg>