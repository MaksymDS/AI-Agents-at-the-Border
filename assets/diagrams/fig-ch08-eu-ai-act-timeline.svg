<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 744" width="576" height="744">
  <defs/>
  <rect width="576" height="864" fill="#fff"/>
  <text x="40" y="52" font-size="23" font-weight="700" fill="#1B3A5C" letter-spacing="0.3">The EU AI Act Timeline</text>
  <rect x="40" y="62" width="46" height="4" rx="2" fill="#E8A33D"/>
  <text x="536" y="34" text-anchor="end" font-size="9.5" font-weight="600" fill="#5C6B7A" letter-spacing="1.5">CHAPTER 8</text>
  <text x="40" y="84" font-size="11" fill="#5C6B7A">The dated obligations, not the headlines</text>
  <text x="40" y="106" font-size="10" fill="#1A1A1A" font-weight="400">
    <tspan x="40" dy="0">The reference regime phases in on fixed dates. Border-management risk systems sit in the</tspan>
    <tspan x="40" dy="12.5">high-risk tier.</tspan>
  </text>
  <line x1="150" y1="190" x2="150" y2="610" stroke="#5C6B7A" stroke-width="2"/>
  <circle cx="150" cy="190" r="6" fill="#1B3A5C" stroke="#fff" stroke-width="2"/>
  <text x="134" y="194" font-size="12" fill="#1B3A5C" font-weight="700" text-anchor="end">2 Feb 2025</text>
  <text x="168" y="188" font-size="10.5" fill="#1A1A1A" font-weight="600">
    <tspan x="168" dy="0">Prohibitions in force + AI-literacy duty (Art. 4)</tspan>
  </text>
  <circle cx="150" cy="295" r="6" fill="#1B3A5C" stroke="#fff" stroke-width="2"/>
  <text x="134" y="299" font-size="12" fill="#1B3A5C" font-weight="700" text-anchor="end">2 Aug 2025</text>
  <text x="168" y="293" font-size="10.5" fill="#1A1A1A" font-weight="600">
    <tspan x="168" dy="0">GPAI model obligations begin</tspan>
  </text>
  <circle cx="150" cy="400" r="6" fill="#1B3A5C" stroke="#fff" stroke-width="2"/>
  <text x="134" y="404" font-size="12" fill="#1B3A5C" font-weight="700" text-anchor="end">2 Dec 2026</text>
  <text x="168" y="398" font-size="10.5" fill="#1A1A1A" font-weight="600">
    <tspan x="168" dy="0">Transparency solutions (Art. 50)</tspan>
  </text>
  <circle cx="150" cy="505" r="9" fill="#E8A33D" stroke="#fff" stroke-width="2"/>
  <text x="134" y="509" font-size="12" fill="#1B3A5C" font-weight="700" text-anchor="end">2 Dec 2027</text>
  <text x="168" y="503" font-size="10.5" fill="#1A1A1A" font-weight="600">
    <tspan x="168" dy="0">Standalone Annex III high-risk obligations</tspan>
  </text>
  <text x="168" y="527" font-size="9" fill="#B77A16" font-weight="700">&#x2190; border management = Annex III high-risk</text>
  <circle cx="150" cy="610" r="6" fill="#1B3A5C" stroke="#fff" stroke-width="2"/>
  <text x="134" y="614" font-size="12" fill="#1B3A5C" font-weight="700" text-anchor="end">2 Aug 2028</text>
  <text x="168" y="608" font-size="10.5" fill="#1A1A1A" font-weight="600">
    <tspan x="168" dy="0">Embedded (Annex I) high-risk obligations</tspan>
  </text>
  <text x="40" y="692" font-size="9" fill="#5C6B7A" font-weight="400" font-style="italic">Digital Omnibus adopted June 2026; re-verify the calendar before procurement.</text>
  <rect x="40" y="636" width="496" height="34" rx="4" fill="#5C6B7A"/>
  <rect x="40" y="636" width="5" height="34" rx="2.5" fill="#E8A33D"/>
  <text x="292" y="657.5" text-anchor="middle" font-size="10.6" font-weight="600" fill="#fff" letter-spacing="0.2">Plan against the dated obligations &#x2014; the deadline moved once already.</text>

</svg>
