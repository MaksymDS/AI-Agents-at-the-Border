<?xml version="1.0"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 744" width="576" height="744">
<defs><filter id="gs"><feColorMatrix type="saturate" values="0"></feColorMatrix></filter></defs>
<rect width="576" height="864" fill="#fff"></rect>
<g filter="url(#gs)"><text x="40" y="52" font-size="23" font-weight="700" fill="#1B3A5C" letter-spacing="0.3">The Three Regulatory Layers</text><rect x="40" y="62" width="46" height="4" rx="2" fill="#E8A33D"></rect><text x="536" y="34" text-anchor="end" font-size="9.5" font-weight="600" fill="#5C6B7A" letter-spacing="1.5">CHAPTER 8</text><text x="40" y="84" font-size="11" fill="#5C6B7A">How law reaches AI systems in customs</text><text x="40" y="106" font-size="10" fill="#1A1A1A" font-weight="400"><tspan x="40" dy="0">Three layers apply at once. Force increases downward — and soft law hardens into binding</tspan><tspan x="40" dy="12.5">requirements through procurement.</tspan></text><rect x="40" y="152" width="444" height="130" rx="8" fill="#A7BBCB"></rect><rect x="60" y="170" width="72" height="20" rx="5" fill="#ffffff" fill-opacity="1" stroke="#C7D1DA"></rect><text x="96" y="184" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1A1A1A" letter-spacing="0.5">LAYER 3</text><text x="144" y="186" font-size="18" font-weight="700" fill="#1A1A1A">Soft law</text><g transform="translate(327.2,170)"><rect x="0" y="0" width="136.8" height="20" rx="10" fill="transparent" stroke="#5C6B7A" stroke-width="1"></rect><text x="68.4" y="13.5" text-anchor="middle" font-size="9" font-weight="600" fill="#1A1A1A">Guidance · non-binding</text></g><text x="60" y="212" font-size="10" fill="#1A1A1A" opacity="0.95">Principles, frameworks and standards — influential, but not binding on their</text><text x="60" y="225" font-size="10" fill="#1A1A1A" opacity="0.95">own.</text><text x="60" y="246" font-size="7.5" font-weight="700" fill="#1A1A1A" opacity="0.7" letter-spacing="1">EXAMPLES</text><g><rect x="60" y="252" width="115.2" height="20" rx="10" fill="#ffffff" stroke="#C7D1DA" stroke-width="1"></rect><text x="117.6" y="265.5" text-anchor="middle" font-size="9" font-weight="600" fill="#1A1A1A">OECD AI Principles</text></g><g><rect x="183.2" y="252" width="88.2" height="20" rx="10" fill="#ffffff" stroke="#C7D1DA" stroke-width="1"></rect><text x="227.29999999999998" y="265.5" text-anchor="middle" font-size="9" font-weight="600" fill="#1A1A1A">ISO/IEC 42001</text></g><g><rect x="279.4" y="252" width="82.80000000000001" height="20" rx="10" fill="#ffffff" stroke="#C7D1DA" stroke-width="1"></rect><text x="320.79999999999995" y="265.5" text-anchor="middle" font-size="9" font-weight="600" fill="#1A1A1A">WCO guidance</text></g><rect x="40" y="294" width="444" height="156" rx="8" fill="#517391"></rect><rect x="60" y="312" width="72" height="20" rx="5" fill="#ffffff" fill-opacity="0.16"></rect><text x="96" y="326" text-anchor="middle" font-size="9.5" font-weight="700" fill="#fff" letter-spacing="0.5">LAYER 2</text><text x="144" y="328" font-size="18" font-weight="700" fill="#fff">AI-specific statutes</text><g transform="translate(311,312)"><rect x="0" y="0" width="153" height="20" rx="10" fill="transparent" stroke="#ffffff" stroke-width="1"></rect><text x="76.5" y="13.5" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">Binding · by jurisdiction</text></g><text x="60" y="354" font-size="10" fill="#fff" opacity="0.95">Horizontal AI laws that classify systems by risk and place duties on</text><text x="60" y="367" font-size="10" fill="#fff" opacity="0.95">high-risk uses.</text><text x="60" y="414" font-size="7.5" font-weight="700" fill="#fff" opacity="0.7" letter-spacing="1">EXAMPLES</text><g><rect x="60" y="420" width="66.6" height="20" rx="10" fill="rgba(255,255,255,0.14)" stroke="rgba(255,255,255,0.5)" stroke-width="1"></rect><text x="93.3" y="433.5" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">EU AI Act</text></g><g><rect x="134.6" y="420" width="185.4" height="20" rx="10" fill="rgba(255,255,255,0.14)" stroke="rgba(255,255,255,0.5)" stroke-width="1"></rect><text x="227.3" y="433.5" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">China · algorithm &amp; GenAI rules</text></g><g><rect x="328" y="420" width="126" height="20" rx="10" fill="rgba(255,255,255,0.14)" stroke="rgba(255,255,255,0.5)" stroke-width="1"></rect><text x="391" y="433.5" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">Korea · AI Basic Act</text></g><rect x="40" y="462" width="444" height="140" rx="8" fill="#1B3A5C"></rect><rect x="60" y="480" width="72" height="20" rx="5" fill="#ffffff" fill-opacity="0.16"></rect><text x="96" y="494" text-anchor="middle" font-size="9.5" font-weight="700" fill="#fff" letter-spacing="0.5">LAYER 1</text><text x="144" y="496" font-size="18" font-weight="700" fill="#fff">Data protection</text><g transform="translate(327.2,480)"><rect x="0" y="0" width="136.8" height="20" rx="10" fill="transparent" stroke="#ffffff" stroke-width="1"></rect><text x="68.4" y="13.5" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">Always on · everywhere</text></g><text x="60" y="522" font-size="10" fill="#fff" opacity="0.95">Underpins every system that touches personal data — lawful basis, purpose</text><text x="60" y="535" font-size="10" fill="#fff" opacity="0.95">limits, data-subject rights.</text><text x="60" y="566" font-size="7.5" font-weight="700" fill="#fff" opacity="0.7" letter-spacing="1">EXAMPLES</text><g><rect x="60" y="572" width="39.6" height="20" rx="10" fill="rgba(255,255,255,0.14)" stroke="rgba(255,255,255,0.5)" stroke-width="1"></rect><text x="79.8" y="585.5" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">GDPR</text></g><g><rect x="107.6" y="572" width="174.60000000000002" height="20" rx="10" fill="rgba(255,255,255,0.14)" stroke="rgba(255,255,255,0.5)" stroke-width="1"></rect><text x="194.9" y="585.5" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">national data-protection acts</text></g><g><rect x="290.20000000000005" y="572" width="163.8" height="20" rx="10" fill="rgba(255,255,255,0.14)" stroke="rgba(255,255,255,0.5)" stroke-width="1"></rect><text x="372.1" y="585.5" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">cross-border transfer rules</text></g><line x1="512" y1="160" x2="512" y2="596" stroke="#E8A33D" stroke-width="3"></line><path d="M507 596 512 608 517 596Z" fill="#E8A33D"></path><circle cx="512" cy="160" r="4" fill="#E8A33D"></circle><text transform="translate(528,600) rotate(-90)" font-size="9.5" font-weight="700" fill="#E8A33D" letter-spacing="1.2">HARDENS THROUGH PROCUREMENT</text><text transform="translate(30,470) rotate(-90)" font-size="8" font-weight="600" fill="#5C6B7A" letter-spacing="1">LEGAL FORCE INCREASES ▾</text><rect x="40" y="636" width="496" height="34" rx="4" fill="#5C6B7A"></rect><rect x="40" y="636" width="5" height="34" rx="2.5" fill="#E8A33D"></rect><text x="292" y="657.5" text-anchor="middle" font-size="10.6" font-weight="600" fill="#fff" letter-spacing="0.2">Customs sits under all three layers at once — design for the strictest rule that applies.</text><text x="40" y="700" font-size="9" font-style="italic" fill="#5C6B7A">Darker = greater binding force. Amber: soft-law standards written into tenders become binding contract terms.</text></g>
</svg>