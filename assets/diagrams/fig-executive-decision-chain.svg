<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 700" width="576" height="700" role="img" aria-labelledby="title desc">
  <title id="title">The Eight-Decision Dependency Chain</title>
  <desc id="desc">Eight sequential management gates. The first four establish a governable task; the last four govern commitment, operation, and renewal.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#5C6B7A"/>
    </marker>
  </defs>

  <rect width="576" height="700" fill="#FFFFFF"/>
  <text x="40" y="48" font-family="Inter, sans-serif" font-size="23" font-weight="700" fill="#1B3A5C">The Decision Dependency Chain</text>
  <rect x="40" y="59" width="58" height="4" rx="2" fill="#E8A33D"/>
  <text x="536" y="31" text-anchor="end" font-family="Inter, sans-serif" font-size="9.5" font-weight="600" fill="#5C6B7A" letter-spacing="1.5">EXECUTIVE SUMMARY</text>
  <text x="40" y="82" font-family="Inter, sans-serif" font-size="10.5" fill="#5C6B7A">Do these in order. Evidence opens the next gate - confidence does not.</text>

  <text x="40" y="107" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#B77A16" letter-spacing="1.2">FOUNDATION GATES</text>

  <g font-family="Inter, sans-serif">
    <rect x="40" y="118" width="496" height="48" rx="4" fill="#F3F6F8" stroke="#DCE2E8"/>
    <rect x="40" y="118" width="5" height="48" rx="2.5" fill="#E8A33D"/>
    <circle cx="67" cy="142" r="14" fill="#1B3A5C"/>
    <text x="67" y="146" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">1</text>
    <text x="94" y="137" font-size="13" font-weight="700" fill="#1B3A5C">Name the operating constraint</text>
    <text x="94" y="153" font-size="9.5" fill="#5C6B7A">A queue, service clock, control gap, or capacity ceiling - with an owner.</text>

    <line x1="288" y1="168" x2="288" y2="176" stroke="#5C6B7A" stroke-width="1.3" marker-end="url(#arrow)"/>

    <rect x="40" y="180" width="496" height="48" rx="4" fill="#F3F6F8" stroke="#DCE2E8"/>
    <rect x="40" y="180" width="5" height="48" rx="2.5" fill="#E8A33D"/>
    <circle cx="67" cy="204" r="14" fill="#1B3A5C"/>
    <text x="67" y="208" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">2</text>
    <text x="94" y="199" font-size="13" font-weight="700" fill="#1B3A5C">Choose the task and baseline</text>
    <text x="94" y="215" font-size="9.5" fill="#5C6B7A">Bound the workflow; measure volume, time, quality, exceptions, and cost.</text>

    <line x1="288" y1="230" x2="288" y2="238" stroke="#5C6B7A" stroke-width="1.3" marker-end="url(#arrow)"/>

    <rect x="40" y="242" width="496" height="48" rx="4" fill="#F3F6F8" stroke="#DCE2E8"/>
    <rect x="40" y="242" width="5" height="48" rx="2.5" fill="#E8A33D"/>
    <circle cx="67" cy="266" r="14" fill="#1B3A5C"/>
    <text x="67" y="270" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">3</text>
    <text x="94" y="261" font-size="13" font-weight="700" fill="#1B3A5C">Classify autonomy and agency</text>
    <text x="94" y="277" font-size="9.5" fill="#5C6B7A">State who decides, what the system can reach, and what remains impossible.</text>

    <line x1="288" y1="292" x2="288" y2="300" stroke="#5C6B7A" stroke-width="1.3" marker-end="url(#arrow)"/>

    <rect x="40" y="304" width="496" height="48" rx="4" fill="#F3F6F8" stroke="#DCE2E8"/>
    <rect x="40" y="304" width="5" height="48" rx="2.5" fill="#E8A33D"/>
    <circle cx="67" cy="328" r="14" fill="#1B3A5C"/>
    <text x="67" y="332" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">4</text>
    <text x="94" y="323" font-size="13" font-weight="700" fill="#1B3A5C">Set the sovereignty posture</text>
    <text x="94" y="339" font-size="9.5" fill="#5C6B7A">Approve deployment, data paths, subprocessors, retention, evidence, and exit.</text>

    <line x1="40" y1="369" x2="536" y2="369" stroke="#E8A33D" stroke-width="2"/>
    <rect x="204" y="358" width="168" height="22" rx="11" fill="#E8A33D"/>
    <text x="288" y="373" text-anchor="middle" font-size="9" font-weight="700" fill="#1B3A5C" letter-spacing="0.7">FOUNDATION COMPLETE</text>

    <text x="40" y="400" font-size="9" font-weight="700" fill="#5C6B7A" letter-spacing="1.2">COMMITMENT GATES</text>

    <rect x="40" y="411" width="496" height="48" rx="4" fill="#FFFFFF" stroke="#AEBCCA" stroke-width="1.2"/>
    <circle cx="67" cy="435" r="14" fill="#5C6B7A"/>
    <text x="67" y="439" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">5</text>
    <text x="94" y="430" font-size="13" font-weight="700" fill="#1B3A5C">Build the value bridge</text>
    <text x="94" y="446" font-size="9.5" fill="#5C6B7A">Connect output to an operating action; price human work and assurance.</text>

    <line x1="288" y1="461" x2="288" y2="469" stroke="#5C6B7A" stroke-width="1.3" marker-end="url(#arrow)"/>

    <rect x="40" y="473" width="496" height="48" rx="4" fill="#FFFFFF" stroke="#AEBCCA" stroke-width="1.2"/>
    <circle cx="67" cy="497" r="14" fill="#5C6B7A"/>
    <text x="67" y="501" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">6</text>
    <text x="94" y="492" font-size="13" font-weight="700" fill="#1B3A5C">Choose what to own</text>
    <text x="94" y="508" font-size="9.5" fill="#5C6B7A">Set the build-buy-partner boundary; retain judgment, evidence, and exit.</text>

    <line x1="288" y1="523" x2="288" y2="531" stroke="#5C6B7A" stroke-width="1.3" marker-end="url(#arrow)"/>

    <rect x="40" y="535" width="496" height="48" rx="4" fill="#FFFFFF" stroke="#AEBCCA" stroke-width="1.2"/>
    <circle cx="67" cy="559" r="14" fill="#5C6B7A"/>
    <text x="67" y="563" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">7</text>
    <text x="94" y="554" font-size="13" font-weight="700" fill="#1B3A5C">Define the right to operate</text>
    <text x="94" y="570" font-size="8.5" fill="#5C6B7A">Sign the mandate, thresholds, human route, operational assurance record, fallback, and stop.</text>

    <line x1="288" y1="585" x2="288" y2="593" stroke="#5C6B7A" stroke-width="1.3" marker-end="url(#arrow)"/>

    <rect x="40" y="597" width="496" height="48" rx="4" fill="#FFFFFF" stroke="#AEBCCA" stroke-width="1.2"/>
    <circle cx="67" cy="621" r="14" fill="#5C6B7A"/>
    <text x="67" y="625" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">8</text>
    <text x="94" y="616" font-size="13" font-weight="700" fill="#1B3A5C">Create the renewal rhythm</text>
    <text x="94" y="632" font-size="9.5" fill="#5C6B7A">Continue, change, compete, demote, or retire on a dated evidence record.</text>
  </g>

  <rect x="40" y="661" width="496" height="28" rx="4" fill="#1B3A5C"/>
  <rect x="40" y="661" width="5" height="28" rx="2.5" fill="#E8A33D"/>
  <text x="288" y="679" text-anchor="middle" font-family="Inter, sans-serif" font-size="9.8" font-weight="600" fill="#FFFFFF">If Gates 1-4 change, reopen the chain before committing money or authority.</text>
</svg>
