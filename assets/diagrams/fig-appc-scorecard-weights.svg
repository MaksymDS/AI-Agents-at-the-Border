<rect width="576" height="864" fill="#fff"></rect>
<text x="40" y="52" font-size="23" font-weight="700" fill="#1B3A5C" letter-spacing="0.3">The Vendor Scorecard</text><rect x="40" y="62" width="46" height="4" rx="2" fill="#E8A33D"></rect><text x="536" y="34" text-anchor="end" font-size="9.5" font-weight="600" fill="#5C6B7A" letter-spacing="1.5">APPENDIX C</text><text x="40" y="84" font-size="11" fill="#5C6B7A">Where the weight sits — and what auto-fails</text><text x="40" y="106" font-size="10" fill="#1A1A1A" font-weight="400"><tspan x="40" dy="0">Seven domains, weighted to the failure-mode record. Sovereignty/security and rights/exit carry</tspan><tspan x="40" dy="12.5">the most.</tspan></text><rect x="40" y="142" width="73.39999999999999" height="28" fill="#517391"></rect><text x="77.19999999999999" y="155" font-size="9" fill="#fff" font-weight="700" text-anchor="middle">C1</text><text x="77.19999999999999" y="166" font-size="8" fill="#fff" font-weight="400" text-anchor="middle">15%</text><rect x="114.39999999999999" y="142" width="48.6" height="28" fill="#A7BBCB"></rect><text x="139.2" y="155" font-size="9" fill="#1A1A1A" font-weight="700" text-anchor="middle">C2</text><text x="139.2" y="166" font-size="8" fill="#1A1A1A" font-weight="400" text-anchor="middle">10%</text><rect x="164" y="142" width="98.2" height="28" fill="#1B3A5C"></rect><text x="213.6" y="155" font-size="9" fill="#fff" font-weight="700" text-anchor="middle">C3</text><text x="213.6" y="166" font-size="8" fill="#fff" font-weight="400" text-anchor="middle">20%</text><rect x="263.2" y="142" width="73.39999999999999" height="28" fill="#517391"></rect><text x="300.4" y="155" font-size="9" fill="#fff" font-weight="700" text-anchor="middle">C4</text><text x="300.4" y="166" font-size="8" fill="#fff" font-weight="400" text-anchor="middle">15%</text><rect x="337.59999999999997" y="142" width="48.6" height="28" fill="#A7BBCB"></rect><text x="362.4" y="155" font-size="9" fill="#1A1A1A" font-weight="700" text-anchor="middle">C5</text><text x="362.4" y="166" font-size="8" fill="#1A1A1A" font-weight="400" text-anchor="middle">10%</text><rect x="387.2" y="142" width="98.2" height="28" fill="#1B3A5C"></rect><text x="436.8" y="155" font-size="9" fill="#fff" font-weight="700" text-anchor="middle">C6</text><text x="436.8" y="166" font-size="8" fill="#fff" font-weight="400" text-anchor="middle">20%</text><rect x="486.4" y="142" width="48.6" height="28" fill="#A7BBCB"></rect><text x="511.2" y="155" font-size="9" fill="#1A1A1A" font-weight="700" text-anchor="middle">C7</text><text x="511.2" y="166" font-size="8" fill="#1A1A1A" font-weight="400" text-anchor="middle">10%</text><text x="40" y="186" font-size="8.5" fill="#5C6B7A" font-weight="400">Weights set editorially to the failure-mode record; the two 20% domains read heaviest at a glance.</text><line x1="40" y1="210" x2="536" y2="210" stroke="#5C6B7A" stroke-width="1.2"></line><rect x="40" y="210" width="496" height="22" fill="#E9EDF1"></rect><text x="46" y="225" font-size="8.5" fill="#1A1A1A" font-weight="600">DOMAIN</text><text x="210" y="225" font-size="8.5" fill="#1A1A1A" font-weight="600">WHAT IS SCORED</text><text x="400" y="225" font-size="8.5" fill="#1A1A1A" font-weight="600">EVIDENCE CLASS</text><line x1="40" y1="232" x2="536" y2="232" stroke="#5C6B7A" stroke-width="0.8"></line><text x="46" y="249" font-size="10.5" fill="#1B3A5C" font-weight="700">C1</text><text x="62" y="249" font-size="9.5" fill="#1A1A1A" font-weight="600"><tspan x="62" dy="0">Problem fit</tspan></text><rect x="46" y="256" width="24" height="4" rx="2" fill="#517391"></rect><text x="210" y="247" font-size="9" fill="#1A1A1A" font-weight="400"><tspan x="210" dy="0">Response to B.1–B.3; rung discipline</tspan></text><text x="400" y="247" font-size="9" fill="#5C6B7A" font-weight="400"><tspan x="400" dy="0">Conforming schema</tspan></text><rect x="40" y="272" width="496" height="40" fill="#F7F9FA"></rect><text x="46" y="289" font-size="10.5" fill="#1B3A5C" font-weight="700">C2</text><text x="62" y="289" font-size="9.5" fill="#1A1A1A" font-weight="600"><tspan x="62" dy="0">Evidence quality</tspan></text><rect x="46" y="296" width="16" height="4" rx="2" fill="#A7BBCB"></rect><text x="210" y="287" font-size="9" fill="#1A1A1A" font-weight="400"><tspan x="210" dy="0">Verified deployments; attribution</tspan></text><text x="400" y="287" font-size="9" fill="#5C6B7A" font-weight="400"><tspan x="400" dy="0">Primary/secondary grading</tspan></text><text x="46" y="329" font-size="10.5" fill="#1B3A5C" font-weight="700">C3</text><text x="62" y="329" font-size="9.5" fill="#B77A16" font-weight="600"><tspan x="62" dy="0">Sovereignty &amp; security</tspan></text><rect x="46" y="336" width="32" height="4" rx="2" fill="#1B3A5C"></rect><text x="210" y="327" font-size="9" fill="#1A1A1A" font-weight="400"><tspan x="210" dy="0">B.4 + B.6 compliance depth</tspan></text><text x="400" y="327" font-size="9" fill="#5C6B7A" font-weight="400"><tspan x="400" dy="0">Architecture + test results</tspan></text><rect x="40" y="352" width="496" height="40" fill="#F7F9FA"></rect><text x="46" y="369" font-size="10.5" fill="#1B3A5C" font-weight="700">C4</text><text x="62" y="369" font-size="9.5" fill="#1A1A1A" font-weight="600"><tspan x="62" dy="0">Evaluation rigor</tspan></text><rect x="46" y="376" width="24" height="4" rx="2" fill="#517391"></rect><text x="210" y="367" font-size="9" fill="#1A1A1A" font-weight="400"><tspan x="210" dy="0">B.5 artifacts; willingness to gate</tspan></text><text x="400" y="367" font-size="9" fill="#5C6B7A" font-weight="400"><tspan x="400" dy="0">Pre-committed gate plan</tspan></text><text x="46" y="409" font-size="10.5" fill="#1B3A5C" font-weight="700">C5</text><text x="62" y="409" font-size="9.5" fill="#1A1A1A" font-weight="600"><tspan x="62" dy="0">Operations</tspan></text><rect x="46" y="416" width="16" height="4" rx="2" fill="#A7BBCB"></rect><text x="210" y="407" font-size="9" fill="#1A1A1A" font-weight="400"><tspan x="210" dy="0">B.7 readiness; observability</tspan></text><text x="400" y="407" font-size="9" fill="#5C6B7A" font-weight="400"><tspan x="400" dy="0">Telemetry demo</tspan></text><rect x="40" y="432" width="496" height="40" fill="#F7F9FA"></rect><text x="46" y="449" font-size="10.5" fill="#1B3A5C" font-weight="700">C6</text><text x="62" y="449" font-size="9.5" fill="#B77A16" font-weight="600"><tspan x="62" dy="0">Rights &amp; exit</tspan></text><rect x="46" y="456" width="32" height="4" rx="2" fill="#1B3A5C"></rect><text x="210" y="447" font-size="9" fill="#1A1A1A" font-weight="400"><tspan x="210" dy="0">B.8–B.9 accepted vs red-lined</tspan></text><text x="400" y="447" font-size="9" fill="#5C6B7A" font-weight="400"><tspan x="400" dy="0">Marked-up contract</tspan></text><text x="46" y="489" font-size="10.5" fill="#1B3A5C" font-weight="700">C7</text><text x="62" y="489" font-size="9.5" fill="#1A1A1A" font-weight="600"><tspan x="62" dy="0">Delivery &amp; transfer</tspan></text><rect x="46" y="496" width="16" height="4" rx="2" fill="#A7BBCB"></rect><text x="210" y="487" font-size="9" fill="#1A1A1A" font-weight="400"><tspan x="210" dy="0">Team; in-house capacity</tspan></text><text x="400" y="487" font-size="9" fill="#5C6B7A" font-weight="400"><tspan x="400" dy="0">Named individuals + checks</tspan></text><line x1="40" y1="512" x2="536" y2="512" stroke="#5C6B7A" stroke-width="1.2"></line><rect x="40" y="530" width="496" height="150" rx="6" fill="#FCFAF4" stroke="#E8A33D" stroke-width="1.3"></rect><rect x="40" y="530" width="5" height="150" rx="2.5" fill="#E8A33D"></rect><text x="56" y="552" font-size="10" fill="#B77A16" font-weight="700" letter-spacing="1">AUTO-FAIL RED FLAGS</text><path d="M56 569 l4 4 6 -8" fill="none" stroke="#5C6B7A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0"></path><text x="56" y="572" font-size="10" fill="#5C6B7A" font-weight="700">✗</text><text x="70" y="572" font-size="9" fill="#1A1A1A" font-weight="400"><tspan x="70" dy="0">“Fully autonomous” with no exception path</tspan></text><path d="M306 569 l4 4 6 -8" fill="none" stroke="#5C6B7A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0"></path><text x="306" y="572" font-size="10" fill="#5C6B7A" font-weight="700">✗</text><text x="320" y="572" font-size="9" fill="#1A1A1A" font-weight="400"><tspan x="320" dy="0">Accuracy quoted without unit cost</tspan></text><path d="M56 595 l4 4 6 -8" fill="none" stroke="#5C6B7A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0"></path><text x="56" y="598" font-size="10" fill="#5C6B7A" font-weight="700">✗</text><text x="70" y="598" font-size="9" fill="#1A1A1A" font-weight="400"><tspan x="70" dy="0">Silent-update rights (no four-change rule)</tspan></text><path d="M306 595 l4 4 6 -8" fill="none" stroke="#5C6B7A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0"></path><text x="306" y="598" font-size="10" fill="#5C6B7A" font-weight="700">✗</text><text x="320" y="598" font-size="9" fill="#1A1A1A" font-weight="400"><tspan x="320" dy="0">Trajectory data only in the vendor’s cloud</tspan></text><path d="M56 621 l4 4 6 -8" fill="none" stroke="#5C6B7A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0"></path><text x="56" y="624" font-size="10" fill="#5C6B7A" font-weight="700">✗</text><text x="70" y="624" font-size="9" fill="#1A1A1A" font-weight="400"><tspan x="70" dy="0">Trust-all-tools anywhere in production</tspan></text><path d="M306 621 l4 4 6 -8" fill="none" stroke="#5C6B7A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0"></path><text x="306" y="624" font-size="10" fill="#5C6B7A" font-weight="700">✗</text><text x="320" y="624" font-size="9" fill="#1A1A1A" font-weight="400"><tspan x="320" dy="0">Claims that fail attribution</tspan></text><path d="M56 647 l4 4 6 -8" fill="none" stroke="#5C6B7A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0"></path><text x="56" y="650" font-size="10" fill="#5C6B7A" font-weight="700">✗</text><text x="70" y="650" font-size="9" fill="#1A1A1A" font-weight="400"><tspan x="70" dy="0">A complicated answer to the twenty-samples test</tspan></text><path d="M306 647 l4 4 6 -8" fill="none" stroke="#5C6B7A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0"></path><text x="306" y="650" font-size="10" fill="#5C6B7A" font-weight="700">✗</text><text x="320" y="650" font-size="9" fill="#1A1A1A" font-weight="400"><tspan x="320" dy="0">No answer to the twelve-month termination</tspan><tspan x="320" dy="11">question</tspan></text><rect x="40" y="698" width="496" height="34" rx="4" fill="#5C6B7A"></rect><rect x="40" y="698" width="5" height="34" rx="2.5" fill="#E8A33D"></rect><text x="292" y="719.5" text-anchor="middle" font-size="10.6" font-weight="600" fill="#fff" letter-spacing="0.2">Weight the record, not the pitch — and let any red flag end the evaluation.</text>
</svg>