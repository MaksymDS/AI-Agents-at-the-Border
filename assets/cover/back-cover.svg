  <text x="42" y="292" font-family="Inter, sans-serif" font-size="9" font-weight="700" letter-spacing="1.6" fill="#A7BBCB">A DECISION BOOK FOR BORDER LEADERS</text>
  <line x1="42" y1="310" x2="89" y2="310" stroke="#E8A33D" stroke-width="2.5"/>
  <text x="42" y="346" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">AI Agents at the Border is a practical guide</text>
  <text x="42" y="370" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">for leaders who must decide what may be</text>
  <text x="42" y="394" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">delegated — and what must remain human.</text>
  <text x="42" y="432" font-family="Inter, sans-serif" font-size="11.2" fill="#DCE6EE">A field guide to buying, governing and operating</text>
  <text x="42" y="449" font-family="Inter, sans-serif" font-size="11.2" fill="#DCE6EE">AI that can act in trade and customs environments.</text>
  <rect x="42" y="483" width="348" height="45" rx="3" fill="#274967"/>
  <rect x="42" y="483" width="4" height="45" rx="2" fill="#E8A33D"/>
  <text x="60" y="503" font-family="Inter, sans-serif" font-size="9.8" font-weight="700" fill="#FFFFFF">DECISIONS MAY TRANSFER WITHIN A SIGNED MANDATE.</text>
  <text x="60" y="518" font-family="Inter, sans-serif" font-size="9.8" font-weight="700" fill="#FFFFFF">ACCOUNTABILITY DOES NOT.</text>
