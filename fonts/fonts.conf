<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  Build-time font configuration for SVG -> PDF conversion (rsvg-convert).
  The diagram SVGs carry no font-family; they rely on the renderer's
  default sans-serif. This config pins that default to the vendored Inter
  so figure text renders identically on every machine and in CI.
  Activated via FONTCONFIG_FILE (see Makefile / scripts/build.sh / CI).
-->
<fontconfig>
  <dir prefix="relative">inter</dir>
  <cachedir prefix="xdg">fontconfig-book</cachedir>

  <!-- librsvg asks for "serif" when an SVG omits font-family, so pin every
       generic family to Inter; this config is scoped to figure conversion
       and never affects the book's LaTeX text fonts -->
  <match target="pattern">
    <edit name="family" mode="prepend" binding="strong">
      <string>Inter</string>
    </edit>
  </match>

  <alias><family>sans-serif</family><prefer><family>Inter</family></prefer></alias>
  <alias><family>serif</family><prefer><family>Inter</family></prefer></alias>
  <alias><family>monospace</family><prefer><family>Inter</family></prefer></alias>
</fontconfig>
